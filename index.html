  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.35)',backdropFilter:'blur(4px)',WebkitBackdropFilter:'blur(4px)',zIndex:500,display:'flex',alignItems:mob?'flex-end':'center',justifyContent:'center',padding:mob?0:20}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:'#ffffff',border:'1px solid #c8ccd4',borderRadius:mob?'16px 16px 0 0':16,width:mob?'100%':540,maxWidth:'100%',maxHeight:mob?'92vh':'88vh',overflow:'hidden',display:'flex',flexDirection:'column',boxShadow:'0 20px 60px rgba(0,0,0,.15)'}}>
        <div style={{padding:mob?'16px 16px 10px':'20px 22px 14px',borderBottom:'1px solid #e2e4e8',flexShrink:0}}>
          <div style={{fontFamily:"'Inter',sans-serif",fontSize:mob?14:15,fontWeight:700,color:'#111827',marginBottom:4}}>{title}</div>
          <div style={{fontSize:mob?11:12,color:'#374151'}}>{subtitle}</div>
        </div>
        <div style={{padding:mob?'12px 16px':'16px 22px',overflowY:'auto',flex:1}}>{children}</div>
        <div style={{padding:mob?'10px 16px':'12px 22px',borderTop:'1px solid #e2e4e8',display:'flex',justifyContent:'flex-end',gap:8,flexShrink:0}}>{footer}</div>
      </div>
    </div>
  );
}


// ── DATABASE PAGE ─────────────────────────────────────────────
function DatabasePage({dbData,setDbData,saveDbData,dbSearch,setDbSearch,showDbImport,setShowDbImport,showAddProd,setShowAddProd,dbImportRows,setDbImportRows,dbImportErr,setDbImportErr,newProd,setNewProd,dbHistory,setDbHistory,showHistory,setShowHistory,loadDbHistory,restoreDbVersion,dbVersion,setDbVersion,rp,S,isMobile=false}){
  const [saving,setSaving]=useState(false);
  const [toast,setToast]=useState(null);

  const sht=m=>{setToast(m);setTimeout(()=>setToast(null),3000);};

  const editProd=(kode,field,val)=>{
    const prod = dbData.find(p=>p.kode===kode);
    // Validasi: cek harga < hpp setelah edit
    if(field==='harga' && val > 0 && prod?.hpp > 0 && val <= prod.hpp){
      if(!window.confirm(`Harga jual (Rp ${val.toLocaleString('id-ID')}) ≤ HPP (Rp ${prod.hpp.toLocaleString('id-ID')}).
Produk ini akan merugi. Tetap simpan?`)) return;
    }
    if(field==='hpp' && val > 0 && prod?.harga > 0 && prod.harga <= val){
      if(!window.confirm(`HPP baru (Rp ${val.toLocaleString('id-ID')}) ≥ Harga jual (Rp ${prod.harga.toLocaleString('id-ID')}).
Produk ini akan merugi. Tetap simpan?`)) return;
    }
    const nd=dbData.map(p=>p.kode===kode?{...p,[field]:val}:p);
    setDbData(nd);
    DBMAP_LIVE={};
    nd.forEach(p=>{ DBMAP_LIVE[p.kode.toUpperCase()]=p; });
    setSaving(true);
    const label = `Edit ${field} ${kode}`;
    saveDbData(nd,true,label).then(ver=>{setSaving(false);if(ver)setDbVersion(ver);});
    sht('💾 Database diperbarui · versi baru tersimpan');
  };

  const deleteProd=kode=>{
    if(!window.confirm(`Hapus produk ${kode}?`))return;
    const nd=dbData.filter(p=>p.kode!==kode);
    setDbData(nd);
    DBMAP_LIVE={};
    nd.forEach(p=>{ DBMAP_LIVE[p.kode.toUpperCase()]=p; });
    saveDbData(nd,true,`Hapus ${kode}`).then(ver=>{if(ver)setDbVersion(ver);});
    sht(`🗑️ ${kode} dihapus · versi baru tersimpan`);
  };

  const addProd=()=>{
    if(!newProd.kode.trim()){alert('Kode wajib diisi');return;}
    if(!/^[A-Za-z0-9\-\/]+$/.test(newProd.kode.trim())){alert('Kode hanya boleh huruf, angka, - dan /');return;}
    if(dbData.find(p=>p.kode.toUpperCase()===newProd.kode.toUpperCase())){alert('Kode sudah ada di database');return;}
    if(newProd.hpp < 0){alert('HPP tidak boleh negatif');return;}
    if(newProd.harga < 0){alert('Harga jual tidak boleh negatif');return;}
    if(newProd.harga > 0 && newProd.hpp > 0 && newProd.harga <= newProd.hpp){
      if(!window.confirm(`Harga jual (Rp ${newProd.harga.toLocaleString('id-ID')}) ≤ HPP (Rp ${newProd.hpp.toLocaleString('id-ID')}).
Produk ini akan merugi. Tetap simpan?`)) return;
    }
    const kodeUp=newProd.kode.toUpperCase().trim();
    const nd=[...dbData,{...newProd,kode:kodeUp}];
    setDbData(nd);
    DBMAP_LIVE={};
    nd.forEach(p=>{ DBMAP_LIVE[p.kode.toUpperCase()]=p; });
    saveDbData(nd,true,`Tambah ${kodeUp}`).then(ver=>{if(ver)setDbVersion(ver);});
    setNewProd({kode:'',nama:'',hpp:0,harga:0});
    setShowAddProd(false);
    sht(`✅ ${kodeUp} ditambahkan · versi baru tersimpan`);
  };

  const handleImportFile=f=>{
    if(!f?.name.endsWith('.csv')){setDbImportErr('Hanya .csv');return;}
    const r=new FileReader();
    r.onload=e=>{
      try{
        const lines=e.target.result.replace(/\r\n/g,'\n').split('\n').filter(l=>l.trim());
        // Auto-detect header
        let startRow=0;
        if(lines[0].toLowerCase().includes('harga jual')||lines[0].toLowerCase().includes('hpp list')) startRow=2;
        else if(lines[0].toLowerCase().includes('kode')) startRow=1;

        const rows=[];
        for(let i=startRow;i<lines.length;i++){
          const parts=lines[i].split(',');
          const kode=parts[0]?.trim();
          if(!kode)continue;
          const hpp=parseInt((parts[1]||'').replace(/[^0-9]/g,'')||'0');
          // Try col 4 first (harga 40%), then col 3 (harga 45%), then col 1
          const harga=parseInt((parts[4]||parts[3]||parts[1]||'').replace(/[^0-9]/g,'')||'0');
          const nama=(parts[5]||'').trim();
          if(kode&&(hpp||harga)) rows.push({kode,hpp,harga,nama});
        }
        if(!rows.length){setDbImportErr('Tidak ada baris valid');return;}
        setDbImportRows(rows);setDbImportErr('');
      }catch(err){setDbImportErr('Error: '+err.message);}
    };
    r.readAsText(f,'UTF-8');
  };

  const doImport=()=>{
    if(!dbImportRows?.length)return;
    const map={};
    dbData.forEach(p=>{ map[p.kode.toUpperCase()]=p; });
    dbImportRows.forEach(p=>{ map[p.kode.toUpperCase()]={...map[p.kode.toUpperCase()],...p}; });
    const nd=Object.values(map);
    setDbData(nd);
    DBMAP_LIVE={};
    nd.forEach(p=>{ DBMAP_LIVE[p.kode.toUpperCase()]=p; });
    const label=`Import CSV · ${dbImportRows.length} produk`;
    saveDbData(nd,true,label).then(ver=>{if(ver)setDbVersion(ver);});
    setShowDbImport(false);setDbImportRows(null);setDbImportErr('');
    sht(`✅ ${dbImportRows.length} produk diimport · versi baru tersimpan`);
  };

  const filtered=dbData.filter(p=>(p.kode+'|'+(p.nama||'')).toLowerCase().includes(dbSearch.toLowerCase()));

  return(
    <div>
      {/* HEADER ACTIONS */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14,flexWrap:'wrap',gap:8}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{fontFamily:"'Inter',sans-serif",fontWeight:800,fontSize:14}}>{dbData.length} Produk</div>
          <span style={{fontSize:10,fontWeight:700,padding:'3px 10px',borderRadius:20,background:'#f0f1f3',color:'#374151',border:'1px solid #c8ccd4',fontFamily:"'Inter',sans-serif"}}>
            v{dbVersion}
          </span>
          {saving&&<span style={{fontSize:11,color:'#6b7280'}}>💾 Menyimpan...</span>}
        </div>
        <div style={{display:'flex',gap:7,flexWrap:'wrap',alignItems:'center'}}>
          <input style={S.input} placeholder="Cari kode/nama..." value={dbSearch} onChange={e=>setDbSearch(e.target.value)}/>
          <button style={{...S.btn(false),borderColor:'#bbf7d0',background:'rgba(22,163,74,.1)',color:'#16a34a'}} onClick={()=>setShowAddProd(true)}>➕ Tambah Produk</button>
          <button style={{...S.btn(false),borderColor:'#ddd6fe',background:'#f5f3ff',color:'#7c3aed'}} onClick={()=>{ loadDbHistory().then(h=>setDbHistory(h)); setShowHistory(true); }}>🕐 Histori</button>
          <button style={S.btn(true)} onClick={()=>setShowDbImport(true)}>📥 Import CSV</button>
        </div>
      </div>

      {/* TABLE */}
      <div style={S.card}>
        <div style={{overflowX:'auto',maxHeight:600,overflowY:'auto'}}>
          <table style={S.tbl}>
            <thead>
              <tr>
                <th style={S.th}>#</th>
                <th style={S.th}>Kode</th>
                <th style={S.th}>Nama Produk</th>
                <th style={S.thr}>HPP</th>
                <th style={S.thr}>Harga Jual 40%</th>
                <th style={S.th} colSpan={2}>Aksi</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map((p,i)=>(
                <DbRow key={p.kode} p={p} i={i} editProd={editProd} deleteProd={deleteProd} rp={rp} S={S}/>
              ))}
              {!filtered.length&&(
                <tr><td colSpan={6} style={{...S.td,textAlign:'center',color:'#6b7280',padding:24}}>Tidak ada produk ditemukan</td></tr>
              )}
            </tbody>
          </table>
        </div>
      </div>

      {/* MODAL: TAMBAH PRODUK */}
      {showAddProd&&(
        <Modal onClose={()=>setShowAddProd(false)} title="➕ Tambah Produk Baru" subtitle="Tambahkan produk ke database HPP">
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            {[['Kode *','kode','text'],['Nama','nama','text'],['HPP (Rp)','hpp','number'],['Harga Jual 40% (Rp)','harga','number']].map(([label,field,type])=>(
              <div key={field}>
                <label style={{fontSize:11,fontWeight:700,color:'#6b7280',display:'block',marginBottom:4,textTransform:'uppercase',letterSpacing:'.05em'}}>{label}</label>
                <input style={{...S.input,width:'100%'}} type={type} placeholder={label}
                  value={newProd[field]} onChange={e=>setNewProd(p=>({...p,[field]:type==='number'?parseInt(e.target.value)||0:e.target.value}))}/>
              </div>
            ))}
          </div>
          <div style={{marginTop:16,padding:'10px 14px',background:'#f0f1f3',borderRadius:8,fontSize:11,color:'#374151'}}>
            Preview laba: <strong style={{color:newProd.harga>newProd.hpp?'#16a34a':'#dc2626'}}>{rp(newProd.harga-newProd.hpp)}</strong>
            {' '}· Margin: <strong>{newProd.harga>0?((newProd.harga-newProd.hpp)/newProd.harga*100).toFixed(1)+'%':'—'}</strong>
          </div>
          <div style={{display:'flex',justifyContent:'flex-end',gap:8,marginTop:16}}>
            <button style={S.btn(false)} onClick={()=>setShowAddProd(false)}>Batal</button>
            <button style={S.btn(true)} onClick={addProd}>✅ Simpan Produk</button>
          </div>
        </Modal>
      )}

      {/* MODAL: IMPORT CSV */}
      {showDbImport&&(
        <Modal onClose={()=>{setShowDbImport(false);setDbImportRows(null);setDbImportErr('');}} title="📥 Import Database dari CSV" subtitle="Update HPP & harga jual dari file CSV">
          <div style={{border:'2px dashed #e5e7eb',borderRadius:10,padding:20,textAlign:'center',cursor:'pointer',background:'#f0f1f3',marginBottom:10}} onClick={()=>document.getElementById('dbCsv').click()}>
            <div style={{fontSize:26,marginBottom:5}}>📄</div>
            <div style={{fontFamily:"'Inter',sans-serif",fontWeight:800,fontSize:13,marginBottom:3}}>Klik upload CSV HPP</div>
            <div style={{fontSize:11,color:'#6b7280'}}>Format: KODE, HPP, Harga Awal, Harga 45%, Harga 40%, Nama</div>
            <input id="dbCsv" type="file" accept=".csv" style={{display:'none'}} onChange={e=>handleImportFile(e.target.files[0])}/>
          </div>
          {dbImportRows&&(
            <div style={{fontSize:12,color:'#16a34a',marginBottom:8,fontWeight:600,padding:'8px 12px',background:'rgba(22,163,74,.1)',borderRadius:8}}>
              ✅ {dbImportRows.length} produk siap diimport (merge dengan data existing)
            </div>
          )}
          {dbImportErr&&<div style={{fontSize:12,color:'#dc2626',padding:'8px 12px',background:'rgba(220,38,38,.08)',borderRadius:8,marginBottom:8}}>❌ {dbImportErr}</div>}
          <div style={{fontSize:10,color:'#374151',background:'#f0f1f3',borderRadius:8,padding:'10px 12px',marginBottom:12}}>
            ⚠️ Import akan <strong>memperbarui</strong> produk yang sudah ada dan <strong>menambahkan</strong> produk baru. Versi database akan otomatis naik.
          </div>
          <div style={{display:'flex',justifyContent:'flex-end',gap:8}}>
            <button style={S.btn(false)} onClick={()=>{setShowDbImport(false);setDbImportRows(null);setDbImportErr('');}}>Batal</button>
            <button style={{...S.btn(true),opacity:!dbImportRows?0.4:1}} disabled={!dbImportRows} onClick={doImport}>📥 Import Sekarang</button>
          </div>
        </Modal>
      )}

      {/* MODAL: HISTORI */}
      {showHistory&&(
        <Modal onClose={()=>setShowHistory(false)} title="🕐 Histori Database" subtitle="Semua versi tersimpan — klik Restore untuk kembali ke versi sebelumnya">
          <div style={{marginBottom:12,padding:'8px 12px',background:'rgba(22,163,74,.1)',borderRadius:8,border:'1px solid rgba(22,163,74,.25)',display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:12}}>✅</span>
            <span style={{fontSize:12,color:'#16a34a'}}>Versi saat ini: <strong>v{dbVersion}</strong> · {dbData.length} produk</span>
          </div>
          {dbHistory.length===0?(
            <div style={{textAlign:'center',padding:'32px 0',color:'#6b7280'}}>
              <div style={{fontSize:28,marginBottom:8}}>📭</div>
              <div style={{fontSize:13}}>Belum ada histori tersimpan</div>
              <div style={{fontSize:11,marginTop:4}}>Histori dibuat otomatis setiap kali ada perubahan database</div>
            </div>
          ):(
            <div style={{maxHeight:'55vh',overflowY:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                <thead>
                  <tr style={{background:'#f0f1f3'}}>
                    <th style={{padding:'8px 12px',textAlign:'left',fontSize:9,fontWeight:800,textTransform:'uppercase',color:'#6b7280',borderBottom:'1px solid #e2e4e8'}}>Versi</th>
                    <th style={{padding:'8px 12px',textAlign:'left',fontSize:9,fontWeight:800,textTransform:'uppercase',color:'#6b7280',borderBottom:'1px solid #e2e4e8'}}>Keterangan</th>
                    <th style={{padding:'8px 12px',textAlign:'center',fontSize:9,fontWeight:800,textTransform:'uppercase',color:'#6b7280',borderBottom:'1px solid #e2e4e8'}}>Produk</th>
                    <th style={{padding:'8px 12px',textAlign:'left',fontSize:9,fontWeight:800,textTransform:'uppercase',color:'#6b7280',borderBottom:'1px solid #e2e4e8'}}>Waktu Simpan</th>
                    <th style={{padding:'8px 12px',textAlign:'center',fontSize:9,fontWeight:800,textTransform:'uppercase',color:'#6b7280',borderBottom:'1px solid #e2e4e8'}}>Aksi</th>
                  </tr>
                </thead>
                <tbody>
                  {dbHistory.map((h,i)=>(
                    <tr key={h.id||i} style={{borderBottom:'1px solid #e2e4e8'}} onMouseEnter={e=>e.currentTarget.style.background='#f0f1f3'} onMouseLeave={e=>e.currentTarget.style.background=''}>
                      <td style={{padding:'10px 12px'}}>
                        <span style={{fontFamily:"'Inter',sans-serif",fontWeight:800,fontSize:12,color:'#7c3aed'}}>v{h.version}</span>
                      </td>
                      <td style={{padding:'10px 12px',fontSize:11,color:'#374151',maxWidth:200}}>
                        {h.label||'Edit manual'}
                      </td>
                      <td style={{padding:'10px 12px',textAlign:'center'}}>
                        <span style={{fontSize:11,fontFamily:"'Inter',sans-serif",fontWeight:700,color:'#374151'}}>
                          {Array.isArray(h.db_data)?h.db_data.length:'—'} produk
                        </span>
                      </td>
                      <td style={{padding:'10px 12px',fontSize:11,color:'#6b7280',whiteSpace:'nowrap'}}>
                        {new Date(h.saved_at).toLocaleString('id-ID',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}
                      </td>
                      <td style={{padding:'10px 12px',textAlign:'center'}}>
                        <button
                          style={{fontSize:10,fontWeight:700,padding:'4px 12px',borderRadius:7,border:'1.5px solid #ddd6fe',background:'#f5f3ff',color:'#7c3aed',cursor:'pointer',fontFamily:"'Inter',sans-serif"}}
                          onClick={()=>{ restoreDbVersion(h); setShowHistory(false); }}>
                          ↩️ Restore
                        </button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
          <div style={{display:'flex',justifyContent:'flex-end',marginTop:16}}>
            <button style={S.btn(false)} onClick={()=>setShowHistory(false)}>Tutup</button>
          </div>
        </Modal>
      )}

      {toast&&<div style={{position:'fixed',bottom:18,right:18,background:'#ffffff',backdropFilter:'blur(12px)',color:'#111827',border:'1px solid #c8ccd4',fontFamily:"'Inter',sans-serif",fontWeight:700,fontSize:12,padding:'9px 16px',borderRadius:9,zIndex:999,boxShadow:'0 8px 24px rgba(0,0,0,.2)'}}>{toast}</div>}
    </div>
  );
}

function DbRow({p,i,editProd,deleteProd,rp,S}){
  return(
    <tr style={{borderBottom:'1px solid #e2e4e8'}} onMouseEnter={e=>e.currentTarget.style.background='#f0f1f3'} onMouseLeave={e=>e.currentTarget.style.background=''}>
      <td style={{...S.td,fontSize:9,color:'#6b7280',textAlign:'center'}}>{i+1}</td>
      <td style={S.td}>
        <span style={{fontFamily:"'Inter',sans-serif",fontWeight:700,fontSize:11}}>{p.kode}</span>
      </td>
      <td style={S.td}>
        <EditCell value={p.nama||''} onSave={v=>editProd(p.kode,'nama',v)} width={160} color='#6b7280'>
          <span style={{fontSize:11,color:'#374151'}}>{p.nama||<span style={{color:'#d1d5db'}}>—</span>}</span>
        </EditCell>
      </td>
      <td style={S.tdr}>
        <EditCell value={p.hpp} onSave={v=>editProd(p.kode,'hpp',Math.max(0,parseInt(v)||0))} type='number' width={90} bold constraints={{min:0,max:99999999}}>
          <span style={{fontFamily:"'Inter',sans-serif",fontWeight:700,fontSize:11}}>{rp(p.hpp)}</span>
        </EditCell>
      </td>
      <td style={S.tdr}>
        <EditCell value={p.harga} onSave={v=>editProd(p.kode,'harga',Math.max(0,parseInt(v)||0))} type='number' width={90} bold constraints={{min:0,max:99999999}}>
          <span style={{fontFamily:"'Inter',sans-serif",fontWeight:700,fontSize:11,color:'#2563eb'}}>{rp(p.harga)}</span>
        </EditCell>
      </td>
      <td style={{...S.td,textAlign:'right'}}>
        <span style={{fontSize:10,color:p.harga>p.hpp?'#16a34a':'#dc2626',fontWeight:700}}>
          {p.harga>0?((p.harga-p.hpp)/p.harga*100).toFixed(0)+'%':'—'}
        </span>
      </td>
      <td style={{...S.td,textAlign:'center'}}>
        <button style={{fontSize:11,background:'none',border:'none',cursor:'pointer',color:'#ef4444',padding:'2px 6px',borderRadius:4}} onClick={()=>deleteProd(p.kode)} title="Hapus">🗑️</button>
      </td>
    </tr>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
  </script>
</body>
