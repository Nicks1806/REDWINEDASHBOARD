// ── SAFE ARITHMETIC ──────────────────────────────────────────
// Semua kalkulasi keuangan dibulatkan ke integer rupiah untuk
// menghindari floating point error (99.9 * 3 = 299.70000000000005)
const safeRp = (n) => Math.round(Number(n) || 0);
const safeMul = (a, b) => safeRp(safeRp(a) * safeRp(b));
const safeSub = (a, b) => safeRp(a) - safeRp(b);
const safeDiv = (a, b) => b > 0 ? safeRp(a) / safeRp(b) : 0;
const safePct = (num, den) => den > 0 ? Math.round((num / den) * 1000) / 10 : 0; // 1 decimal

// HPP = 0 berarti belum diisi, bukan berarti gratis
const hppDisplay = (hpp) => hpp > 0 ? hpp : null; // null = tidak diketahui
const marginSafe = (laba, rev, hpp) => {
  if(hpp <= 0) return null; // HPP tidak diketahui
  if(rev <= 0) return 0;
  return safePct(laba, rev);
};

function lev(a,b){const m=a.length,n=b.length,d=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)d[i][j]=a[i-1]===b[j-1]?d[i-1][j-1]:1+Math.min(d[i-1][j],d[i][j-1],d[i-1][j-1]);return d[m][n];}
function findMatch(raw){
  const up=raw.toUpperCase(),ns=up.replace(/[-\s]/g,'');
  if(DBMAP[up])return{status:'ok',dbEntry:DBMAP[up]};
  for(const k of DBKEYS)if(k.replace(/[-\s]/g,'')===ns)return{status:'ok',dbEntry:DBMAP[k]};
  const scores=DBKEYS.map(k=>{const nk=k.replace(/[-\s]/g,'');const s=1-lev(nk,ns)/Math.max(nk.length,ns.length);const b=nk.startsWith(ns.substring(0,3))?0.1:0;return{k,score:s+b,dbEntry:DBMAP[k]};}).sort((a,b)=>b.score-a.score).slice(0,5).filter(x=>x.score>0.55);
  if(scores.length)return{status:'warn',suggestions:scores};
  return{status:'miss'};
}

  const [page, setPage] = useState('overview');
  

;
  const [txData, setTxData] = useState(null);
  const [resolved, setResolved] = useState({});
  const [monthFilter, setMonthFilter] = useState(0);
  const [txFilter, setTxFilter] = useState('issues');
  const [search, setSearch] = useState('');
  const [prodMonth, setProdMonth] = useState(0);
  const [prodSearch, setProdSearch] = useState('');
  const [dbData, setDbData] = useState(null);
  const [dbSearch, setDbSearch] = useState('');
  const [showDbImport, setShowDbImport] = useState(false);
  const [showAddProd, setShowAddProd] = useState(false);
  const [dbImportRows, setDbImportRows] = useState(null);
  const [dbImportErr, setDbImportErr] = useState('');
  const [newProd, setNewProd] = useState({kode:'',nama:'',hpp:0,harga:0});
  const [dbHistory, setDbHistory] = useState([]);
  const [showHistory, setShowHistory] = useState(false);
  const [dbVersion, setDbVersion] = useState('1.0');
  const [targetOmzet, setTargetOmzet] = useState({});  // {bulan: target}
  const [showTarget, setShowTarget] = useState(false);
  const [syncing, setSyncing] = useState(false);
  const [lastSync, setLastSync] = useState(null);
  const [online, setOnline] = useState(true);
  const [toast, setToast] = useState(null);
  const [showFix, setShowFix] = useState(false);
  const [showUpload, setShowUpload] = useState(false);
  const [uploadName, setUploadName] = useState('');
  const [uploadRows, setUploadRows] = useState(null);
  const [uploadErr, setUploadErr] = useState('');
  const [uploadWarn, setUploadWarn] = useState(null);
  const [uploadSeg, setUploadSeg] = useState('auto');
  const [dragOver, setDragOver] = useState(false);
  const [segFilter, setSegFilter] = useState('all'); // 'all' | 'TM' | 'MKT'
  const [isMobile, setIsMobile] = useState(typeof window!=='undefined'&&window.innerWidth<768);
  const saveTimer = useRef(null);

  // ── RESPONSIVE LISTENER ──
  useEffect(()=>{
    const onResize=()=>setIsMobile(window.innerWidth<768);
    window.addEventListener('resize',onResize);
    return ()=>window.removeEventListener('resize',onResize);
  },[]);
  const subRef = useRef(null);

  // ── LOAD from Supabase ──
  useEffect(() => {
    // Set favicon dynamically from embedded logo
    const link = document.querySelector("link[rel~='icon']") || document.createElement('link');
    link.rel = 'icon';
    link.href = `data:image/jpeg;base64,${LOGO_B64}`;
    document.head.appendChild(link);
    document.title = 'RedWine Dashboard v1.2';

    loadData();
    loadDbData();
    setupRealtime();
    return () => { if(subRef.current) supabase.removeChannel(subRef.current); };
  }, []);

  async function loadDbData() {
    try {
      const {data, error} = await supabase.from('product_db').select('*').eq('store_id','TM3-ELLEN').single();
      if(error && error.code==='PGRST116') {
        // First time - seed from CSV
        await supabase.from('product_db').upsert({store_id:'TM3-ELLEN', db_data: SEED_DB, version: '1.0', updated_at: new Date().toISOString()}, {onConflict:'store_id'});
        setDbData(SEED_DB);
      } else if(data) {
        setDbData(data.db_data);
        setDbVersion(data.version || '1.0');
      }
    } catch(e) { console.error('loadDb error:',e); setDbData(SEED_DB); }
  }

  async function saveDbData(newDb, bumpVersion, changeLabel) {
    try {
      const {data: cur} = await supabase.from('product_db').select('*').eq('store_id','TM3-ELLEN').single();
      const oldVer = cur?.version || '1.0';
      const parts = oldVer.split('.');
      const newVer = bumpVersion ? (parts[0] + '.' + (parseInt(parts[1]||0) + 1)) : oldVer;

      // Save history snapshot before overwriting
      if(bumpVersion && cur?.db_data) {
        await supabase.from('product_db_history').insert({
          store_id: 'TM3-ELLEN',
          version: oldVer,
          db_data: cur.db_data,
          label: changeLabel || 'Edit manual',
          saved_at: cur.updated_at || new Date().toISOString()
        });
      }

      await supabase.from('product_db').upsert({
        store_id:'TM3-ELLEN', db_data: newDb, version: newVer,
        updated_at: new Date().toISOString()
      }, {onConflict:'store_id'});

      DBMAP_LIVE = {};
      newDb.forEach(p => { DBMAP_LIVE[p.kode.toUpperCase()] = p; });
      return newVer;
    } catch(e) { console.error('saveDb error:',e); }
  }

  async function loadDbHistory() {
    try {
      const {data} = await supabase.from('product_db_history')
        .select('*').eq('store_id','TM3-ELLEN')
        .order('saved_at', {ascending: false}).limit(20);
      return data || [];
    } catch(e) { console.error('loadHistory error:',e); return []; }
  }

  async function restoreDbVersion(historyRow) {
    const confirmed = window.confirm(
      `Kembalikan ke versi ${historyRow.version}?\n${historyRow.label} · ${new Date(historyRow.saved_at).toLocaleString('id-ID')}`
    );
    if(!confirmed) return;
    const restoredDb = historyRow.db_data;
    await saveDbData(restoredDb, true, `Restore dari v${historyRow.version}`);
    setDbData(restoredDb);
    showToastMsg(`✅ Database dikembalikan ke v${historyRow.version}`);
  }

  async function loadData() {
    setSyncing(true);
    try {
      const { data, error } = await supabase
        .from('dashboard_state')
        .select('*')
        .eq('store_id', 'TM3-ELLEN')
        .single();
      if (error && error.code === 'PGRST116') {
        // First time — seed data
        await saveToSupabase(SEED_TX, {});
        setTxData(SEED_TX);
        setResolved({});
      } else if (data) {
        setTxData(data.tx_data);
        setResolved(data.resolved || {});
        setLastSync(new Date(data.updated_at));
      }
    } catch(e) {
      console.error(e);
      setTxData(SEED_TX);
      setOnline(false);
    }
    setSyncing(false);
  }

  function setupRealtime() {
    subRef.current = supabase
      .channel('dashboard-changes')
      .on('postgres_changes', {
        event: 'UPDATE',
        schema: 'public',
        table: 'dashboard_state',
        filter: 'store_id=eq.TM3-ELLEN'
      }, (payload) => {
        setTxData(payload.new.tx_data);
        setResolved(payload.new.resolved || {});
        setLastSync(new Date(payload.new.updated_at));
        showToastMsg('🔄 Data diupdate dari device lain');
      })
      .subscribe((status) => {
        setOnline(status === 'SUBSCRIBED');
      });
  }

  async function saveTxSnapshot(label) {
    // Backup snapshot transaksi sebelum operasi besar
    try {
      await supabase.from('tx_history').insert({
        store_id: 'TM3-ELLEN',
        tx_data: txData,
        resolved: resolved,
        label: label,
        saved_at: new Date().toISOString()
      });
    } catch(e) { console.warn('tx snapshot failed:', e); }
  }

  async function saveToSupabase(td, res) {
    try {
      const { error } = await supabase
        .from('dashboard_state')
        .upsert({
          store_id: 'TM3-ELLEN',
          tx_data: td,
          resolved: res,
          updated_at: new Date().toISOString()
        }, { onConflict: 'store_id' });
      if (!error) setLastSync(new Date());
    } catch(e) { console.error('Save error:', e); }
  }

  const persist = useCallback((td, res) => {
    if(saveTimer.current) clearTimeout(saveTimer.current);
    setSyncing(true);
    saveTimer.current = setTimeout(async () => {
      await saveToSupabase(td, res);
      setSyncing(false);
    }, 800);
  }, []);

  // ── TX with match ──
  const TX_ALL = (txData||[]).map((t,i) => ({...t, idx:i+1, match: findMatch(t.kode)}));
  const TX = segFilter === 'all' ? TX_ALL : TX_ALL.filter(t => (t.segment || 'TM') === segFilter);
  const getEntry = (t) => { const res=resolved[t.idx]; if(res)return DBMAP[res.toUpperCase()]; if(t.match.status==='ok')return t.match.dbEntry; return null; };
  const getStatus = (t) => resolved[t.idx]?'ok':t.match.status;

  // ── MUTATIONS ──
  const applyFix = (idx, dbKode) => { const nr={...resolved,[idx]:dbKode}; setResolved(nr); persist(txData,nr); };
  const applyFixAll = () => {
    // Snapshot sebelum koreksi massal
    saveTxSnapshot('Sebelum Ganti Semua Saran');
    const nr={...resolved};
    TX_ALL.filter(t=>getStatus(t)==='warn').forEach(t=>{
      if(t.match.suggestions?.[0]) nr[t.idx]=t.match.suggestions[0].k;
    });
    setResolved(nr); persist(txData,nr);
    showToastMsg('✅ Semua saran terbaik diterapkan'); setShowFix(false);
  };
  const editTx = (idx, field, val) => { const nd=txData.map((t,i)=>i===idx-1?{...t,[field]:val}:t); setTxData(nd); persist(nd,resolved); };
  const deleteTx = (idx) => {
    // Get the tx being deleted to remove its resolved entry
    const txToDelete = txData[idx-1];
    const nd = txData.filter((_,i) => i !== idx-1);
    // Rebuild resolved: remap old indices to new indices (shift down after deleted idx)
    const newRes = {};
    Object.entries(resolved).forEach(([k,v]) => {
      const ki = parseInt(k);
      if(ki < idx) newRes[k] = v;          // before deleted: keep as-is
      else if(ki > idx) newRes[String(ki-1)] = v; // after deleted: shift down by 1
      // ki === idx: drop it (this was the deleted tx)
    });
    setTxData(nd);
    setResolved(newRes);
    persist(nd, newRes);
    showToastMsg('🗑️ Transaksi dihapus');
  };
  const editHarga = (idx, val) => editTx(idx, 'harga', val);

  const showToastMsg = (m) => { setToast(m); setTimeout(()=>setToast(null),3500); };

  // ── STATS ──
  const getStats = (m) => {
    const txs = m===0 ? TX : TX.filter(t=>t.bulan===m);
    const rev = txs.reduce((s,t) => s + safeMul(t.harga, t.qty), 0);
    const hpp = txs.reduce((s,t) => {
      const e = getEntry(t);
      // HPP=0 di DB → tidak dihitung (bukan berarti gratis)
      return s + (e && e.hpp > 0 ? safeMul(e.hpp, t.qty) : 0);
    }, 0);
    const hppKnown = txs.filter(t => { const e=getEntry(t); return e && e.hpp > 0; }).length;
    const laba = safeSub(rev, hpp);
    const margin = safePct(laba, rev);
    const days = new Set(txs.map(t=>`${t.bulan}-${t.tgl}`)).size;
    return{txs,rev,hpp,laba,margin,days,count:txs.length};
  };

  // ── CSV UPLOAD ──
  // Extract kode from full product name like "Red Wine HNR036 ASTERIA Sandal Flat Wanita"
  const extractKodeFromNama = (nama) => {
    const namaUp = nama.toUpperCase();
    // Sort DB keys by length descending so longer codes match first (KNR001-B1 before KNR001)
    const sorted = [...DBKEYS].sort((a,b) => b.length - a.length);
    for (const k of sorted) {
      // Match kode surrounded by non-alphanumeric chars or start/end
      const escaped = k.replace(/[-\/]/g, '\\$&');
      const re = new RegExp('(?<![A-Z0-9])' + escaped + '(?![A-Z0-9-])');
      if (re.test(namaUp)) return k;
    }
    // Fallback: try extracting number patterns like (1738) -> W1738
    const numMatch = namaUp.match(/\(\s*(\d{3,4})\s*\)/);
    if (numMatch) {
      const num = numMatch[1];
      const found = DBKEYS.find(k => k.includes(num));
      if (found) return found;
    }
    return null;
  };

  const handleFile = (file) => {
    if(!file?.name.endsWith('.csv')){setUploadErr('Hanya file .csv');return;}
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const lines=e.target.result.replace(/\r\n/g,'\n').split('\n').filter(l=>l.trim());
        if(lines.length<2){setUploadErr('File terlalu pendek');return;}
        const hdr=lines[0].split(',').map(h=>h.trim().toLowerCase());
        const fi=(aliases)=>{for(const a of aliases){const i=hdr.indexOf(a);if(i>=0)return i;}return -1;};

        // Detect format:
        // Format A (standar): kolom tgl, kode, harga
        // Format B (Jubelio/marketplace): Nama Barang, QTY, amount — tanpa tgl, kode dari nama
        const isFormatB = fi(['nama barang','nama_barang','name','product name','product_name']) >= 0
          && fi(['tgl','tanggal']) < 0;

        // Auto-detect segment from headers
        const hasShopeeCol = hdr.some(h=>h.includes('shopee')||h.includes('user shopee'));
        const hasBuyerCol = fi(['nama user shopee','nama user','buyer','username']);
        if(uploadSeg==='auto' && (hasShopeeCol||isFormatB)) setUploadSeg('MKT');

        const rows = [];
        let skipped = 0;

        if (isFormatB) {
          // Format B: Nama Barang, QTY, amount
          const cNama = fi(['nama barang','nama_barang','name','product name','product_name']);
          const cQty  = fi(['qty','jumlah','quantity']);
          const cHarga= fi(['amount','harga','harga_jual','price','total']);
          const cKet  = fi(['ket','keterangan','catatan','note','notes']);

          if(cNama<0||cHarga<0){setUploadErr('Kolom "Nama Barang" dan "amount" harus ada');return;}

          lines.slice(1).forEach((line,idx)=>{
            // Handle quoted fields with commas inside
            const cols = line.match(/(".*?"|[^,]+)/g)?.map(s=>s.replace(/^"|"$/g,'').trim()) || line.split(',').map(s=>s.trim());
            const nama = cols[cNama]||'';
            if(!nama) return;

            // Skip non-product rows
            if(/bubble wrap|handling fee|ongkir|packing|diskon|voucher|pengiriman/i.test(nama)){skipped++;return;}

            // Extract harga - format: 149.000 (dot as thousands sep in ID)
            const hargaRaw = (cols[cHarga]||'').replace(/\./g,'').replace(',','.');
            const harga = parseFloat(hargaRaw);
            if(isNaN(harga)||harga<=0){skipped++;return;}

            const qty = Math.max(1, parseInt(cols[cQty]||'1')||1);
            const ket = cKet>=0 ? (cols[cKet]||'') : nama; // store full name as ket

            // Extract kode from nama
            const kode = extractKodeFromNama(nama);

            rows.push({
              tgl: idx+1, // use row number as tgl since no date in this format
              kode: kode || nama.substring(0,30), // fallback to nama if no kode found
              warna: '',
              size: '',
              qty,
              harga: Math.round(harga),
              ket: nama, // store full nama as keterangan
              segment: uploadSeg!=='auto'?uploadSeg:'MKT', // Format Jubelio = Marketplace
              _fromNama: !kode, // flag: kode extracted from nama, may need review
            });
          });
        } else {
          // Format A: standar dengan kolom tgl, kode, harga
          const C={tgl:fi(['tgl','tanggal','tgl transaksi']),kode:fi(['kode','kode_produk','product','kode barang']),warna:fi(['warna','color']),size:fi(['size','ukuran']),qty:fi(['qty','jumlah','pcs']),harga:fi(['harga','harga_jual','price','amount']),ket:fi(['ket','keterangan','catatan']),seg:fi(['segment','segmen','channel']),buyer:hasBuyerCol>=0?hasBuyerCol:fi(['nama user shopee','nama user','buyer','username'])};
          if(C.tgl<0||C.kode<0||C.harga<0){setUploadErr('Kolom tgl/kode/harga tidak ditemukan.\nAtau gunakan format: Nama Barang, QTY, amount');return;}
          const validErrs = [];
          const dupeCheck = {};
          lines.slice(1).forEach((line,lineIdx)=>{
            const cols=line.split(',');
            const kode=(cols[C.kode]?.trim()||'').toUpperCase();
            const hargaRaw=(cols[C.harga]||'').replace(/\./g,'').replace(',','.');
            const harga=Math.round(parseFloat(hargaRaw.replace(/[^0-9.]/g,''))||0);
            const tgl=parseInt(cols[C.tgl]);
            const qty=Math.max(1,parseInt(cols[C.qty]||'1')||1);
            // Validasi
            if(!kode){ validErrs.push(`Baris ${lineIdx+2}: kode kosong`); return; }
            if(isNaN(tgl)||tgl<1||tgl>31){ validErrs.push(`Baris ${lineIdx+2}: tanggal tidak valid (${cols[C.tgl]})`); return; }
            if(harga<=0){ validErrs.push(`Baris ${lineIdx+2}: harga tidak valid (${cols[C.harga]})`); return; }
            if(qty<1||qty>9999){ validErrs.push(`Baris ${lineIdx+2}: qty tidak valid (${cols[C.qty]})`); return; }
            // Cek duplikat dalam file yang sama
            const dk = `${tgl}|${kode}|${harga}`;
            dupeCheck[dk] = (dupeCheck[dk]||0)+1;
            const segRaw = C.seg>=0 ? (cols[C.seg]||'').trim().toUpperCase() : '';
            const segment = uploadSeg!=='auto'?uploadSeg:(segRaw.includes('MKT')||segRaw.includes('MARKETPLACE')||segRaw.includes('ONLINE') ? 'MKT' : 'TM');
            const buyer = C.buyer>=0?(cols[C.buyer]||'').trim():'';
            rows.push({tgl,kode,warna:(C.warna>=0?cols[C.warna]:'')?.trim()||'',size:(C.size>=0?cols[C.size]:'')?.trim()||'',qty,harga,ket:(C.ket>=0?cols[C.ket]:'')?.trim()||'',segment,buyer});
          });
          const dupeKeys = Object.entries(dupeCheck).filter(([,v])=>v>1);
          if(validErrs.length>0) { setUploadErr('❌ '+validErrs.slice(0,3).join(' | ')+(validErrs.length>3?` (+${validErrs.length-3} lainnya)`:'')); return; }
          if(dupeKeys.length>0) {
            const dupeMsg = dupeKeys.slice(0,3).map(([k])=>{const[tgl,kode]=k.split('|');return`Tgl ${tgl} ${kode}`;}).join(', ');
            setUploadWarn(w=>({...w, dupes: `⚠️ ${dupeKeys.length} kemungkinan duplikat: ${dupeMsg}`}));
          }
        }

        if(!rows.length){setUploadErr('Tidak ada baris valid ditemukan');return;}
        const tidakTerbaca = rows.filter(r=>r._fromNama);
        setUploadRows(rows);
        setUploadErr('');
        setUploadWarn({
          tidakTerbaca: tidakTerbaca.map(r=>r.ket), // nama asli
          skipped,
        });
      }catch(err){setUploadErr('Error: '+err.message);}
    };
    reader.readAsText(file,'UTF-8');
  };

  const exportCSV = (bulan) => {
    const src = bulan===0 ? TX : TX.filter(t=>t.bulan===bulan);
    const MNAME_MAP={1:'Januari',2:'Februari',3:'Maret',4:'April',5:'Mei',6:'Juni',7:'Juli',8:'Agustus',9:'September',10:'Oktober',11:'November',12:'Desember'};
    const rows = [['Bulan','Tanggal','Kode','Kode DB','Warna','Size','Qty','Harga Transaksi','HPP','Laba','Margin %','Status','Segmen','Keterangan']];
    src.forEach(t => {
      const e=getEntry(t); const st=getStatus(t);
      const tJ=t.harga*t.qty; const hpp=e?e.hpp*t.qty:0; const laba=tJ-hpp;
      rows.push([
        MNAME_MAP[t.bulan]||t.bulan, t.tgl,
        t.kode, e?e.kode:'-',
        t.warna||'', t.size||'', t.qty,
        t.harga, e?e.hpp:0, e?laba:0,
        e&&tJ>0?(laba/tJ*100).toFixed(1)+'%':'-',
        st==='ok'?'OK':st==='warn'?'Mirip':'Tidak Ada',
        (t.segment||'TM')==='TM'?'TM':'Marketplace',
        t.ket||''
      ]);
    });
    const csv = rows.map(r=>r.map(v=>typeof v==='string'&&v.includes(',')?`"${v}"`:v).join(',')).join('\n');
    const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download=`RedWine_TM3_${bulan===0?'Q1':MNAME_MAP[bulan]||'Bulan'+bulan}.csv`;
    a.click(); URL.revokeObjectURL(url);
    showToastMsg(`📥 Export ${src.length} transaksi berhasil`);
  };

  // ── PDF EXPORT ──
  const generatePDF = (bulan) => {
    if(typeof window.jspdf==='undefined'){showToastMsg('PDF library belum dimuat');return;}
    const {jsPDF} = window.jspdf;
    const doc = new jsPDF('p','mm','a4');
    const s = getStats(bulan);
    const monthName = MNAME[bulan]||`Bulan ${bulan}`;
    const src = TX.filter(t=>t.bulan===bulan);

    // Header
    doc.setFontSize(18);
    doc.setFont('helvetica','bold');
    doc.text('Laporan Penjualan', 14, 20);
    doc.setFontSize(12);
    doc.setFont('helvetica','normal');
    doc.text(`${monthName} 2026 - TM3 Ellen (RedWine)`, 14, 28);
    doc.setDrawColor(176,28,46);
    doc.setLineWidth(0.5);
    doc.line(14, 32, 196, 32);

    // Summary
    doc.setFontSize(10);
    doc.setFont('helvetica','bold');
    doc.text('Ringkasan', 14, 40);
    const tmTx = src.filter(t=>(t.segment||'TM')==='TM');
    const mktTx = src.filter(t=>(t.segment||'TM')==='MKT');
    const tmRev = tmTx.reduce((a,t)=>a+t.harga*t.qty,0);
    const mktRev = mktTx.reduce((a,t)=>a+t.harga*t.qty,0);

    const summaryData = [
      ['Omzet', `Rp ${(s.rev/1e6).toFixed(1)}jt`],
      ['HPP', `Rp ${(s.hpp/1e6).toFixed(1)}jt`],
      ['Laba Kotor', `Rp ${(s.laba/1e6).toFixed(1)}jt`],
      ['Margin', `${s.margin.toFixed(1)}%`],
      ['Transaksi', `${s.count}`],
      ['Hari Aktif', `${s.days} hari`],
      ['TM (Toko)', `${tmTx.length} tx - Rp ${(tmRev/1e6).toFixed(1)}jt`],
      ['Marketplace', `${mktTx.length} tx - Rp ${(mktRev/1e6).toFixed(1)}jt`],
    ];
    doc.autoTable({
      startY: 44,
      head: [['Metric', 'Nilai']],
      body: summaryData,
      theme: 'grid',
      headStyles: {fillColor:[176,28,46]},
      margin: {left:14,right:14},
      styles: {fontSize:9},
    });

    // Top 10 Produk
    const prodMap = {};
    src.forEach(t=>{const e=getEntry(t);const k=e?e.kode:t.kode;if(!prodMap[k])prodMap[k]={kode:k,qty:0,rev:0,laba:0};prodMap[k].qty+=t.qty;prodMap[k].rev+=t.harga*t.qty;const hpp=e?e.hpp*t.qty:0;prodMap[k].laba+=(t.harga*t.qty)-hpp;});
    const topProds = Object.values(prodMap).sort((a,b)=>b.rev-a.rev).slice(0,10);

    doc.setFontSize(10);
    doc.setFont('helvetica','bold');
    const topY = doc.lastAutoTable.finalY + 10;
    doc.text('Top 10 Produk', 14, topY);
    doc.autoTable({
