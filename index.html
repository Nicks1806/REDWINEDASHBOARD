// ── SUB PAGES ─────────────────────────────────────────────────

// ── OVERVIEW PAGE ─────────────────────────────────────────────
function OverviewPage({TX,allBulans,getStats,getEntry,rpM,rp,S,MNAME,MCOL,MSHORT,targetOmzet={},exportCSV,generatePDF,isMobile=false,dbData=null}){
  const [chartView, setChartView] = useState('bulanan'); // 'bulanan' | 'mingguan'
  const [topMode, setTopMode] = useState('laba'); // 'laba' | 'laku' | 'omzet'
  const [progView, setProgView] = useState('line'); // 'line' | 'bar' | 'pie'
  const q = getStats(0);

  // ── MONTHLY DATA ──────────────────────────────────────────
  const bulanStats = allBulans.map(m => {
    const s = getStats(m);
    return { label: (MSHORT[m]||`B${m}`) + " '" + (m<=3?'26':'25'), m, rev: s.rev, laba: s.laba, hpp: s.hpp, count: s.count };
  });

  // ── WEEKLY DATA ────────────────────────────────────────────
  const weeklyData = (() => {
    const weeks = {};
    TX.forEach(t => {
      // Week = bulan + floor((tgl-1)/7)+1
      const weekNum = Math.floor((t.tgl - 1) / 7) + 1;
      const key = `${t.bulan}-W${weekNum}`;
      if (!weeks[key]) weeks[key] = { label: `${MSHORT[t.bulan]||t.bulan} W${weekNum}`, bulan: t.bulan, week: weekNum, rev: 0, laba: 0, hpp: 0 };
      weeks[key].rev += t.harga * t.qty;
      const e = getEntry(t);
      if (e) { weeks[key].hpp += e.hpp * t.qty; }
    });
    return Object.values(weeks)
      .sort((a, b) => a.bulan !== b.bulan ? a.bulan - b.bulan : a.week - b.week)
      .map(w => ({ ...w, laba: w.rev - w.hpp }));
  })();

  const chartData = chartView === 'bulanan' ? bulanStats : weeklyData;
  const maxVal = Math.max(...chartData.map(d => d.rev), 1);

  // ── TOP PRODUK ─────────────────────────────────────────────
  const prodGroups = {};
  TX.forEach(t => {
    const e = getEntry(t);
    const k = e ? e.kode : t.kode;
    if (!prodGroups[k]) prodGroups[k] = { kode: k, isDB: !!e, hpp: e ? e.hpp : 0, rev: 0, qty: 0, laba: 0 };
    prodGroups[k].rev += t.harga * t.qty;
    prodGroups[k].qty += t.qty;
    const hpp = e ? e.hpp * t.qty : 0;
    prodGroups[k].laba += (t.harga * t.qty) - hpp;
  });

  const allProds = Object.values(prodGroups).filter(p => p.isDB);
  const topProds = [...allProds]
    .sort((a, b) => topMode === 'laku' ? b.qty - a.qty : topMode === 'omzet' ? b.rev - a.rev : b.laba - a.laba)
    .slice(0, 10);
  const maxTop = Math.max(...topProds.map(p => topMode === 'laku' ? p.qty : topMode === 'omzet' ? p.rev : p.laba), 1);

  // Y axis ticks
  const yTicks = (() => {
    const step = Math.ceil(maxVal / 5 / 1e6) * 1e6 || 1e6;
    const ticks = [];
    for (let v = 0; v <= maxVal * 1.1; v += step) ticks.push(v);
    return ticks.reverse();
  })();

  const BAR_W = chartView === 'bulanan' ? Math.max(18, Math.min(38, Math.floor(520 / (chartData.length * 2 + chartData.length + 2)))) : Math.max(10, Math.min(22, Math.floor(520 / (chartData.length * 2 + chartData.length + 2))));
  const GAP = Math.floor(BAR_W * 0.2);
  const GROUP_GAP = Math.floor(BAR_W * 0.8);
  const CHART_H = 220;
  const LABEL_H = 40;
  const Y_W = 56;
  const totalW = chartData.length * (BAR_W * 2 + GAP + GROUP_GAP) + Y_W + 20;

  return (
    <div>
      {/* STAT CARDS */}
      <div style={{...S.statsGrid,gridTemplateColumns:isMobile?'repeat(2,1fr)':'repeat(auto-fit,minmax(175px,1fr))'}}>
        {[
          { label: 'Total Omzet Q1', val: rpM(q.rev), sub: `${q.count} tx · ${q.days} hari`, col: '#e63946' },
          { label: 'Total HPP', val: rpM(q.hpp), sub: 'teridentifikasi', col: '#d97706' },
          { label: 'Laba Kotor Q1', val: rpM(q.laba), sub: `Margin ${q.margin.toFixed(1)}%`, col: '#4ade80' },
          { label: 'Rata-rata/Hari', val: rpM(Math.round(q.rev / Math.max(q.days, 1))), sub: `${Math.round(q.count / Math.max(q.days, 1))} tx/hari`, col: '#0891b2' },
        ].map(s => (
          <div key={s.label} style={S.statCard(s.col)}>
            <div style={S.statLbl}>{s.label}</div>
            <div style={S.statVal}>{s.val}</div>
            <div style={S.statSub}>{s.sub}</div>
          </div>
        ))}
      </div>

      {/* CHARTS ROW */}
      <div style={{ display: 'grid', gridTemplateColumns: isMobile?'1fr':'1.4fr 1fr', gap: isMobile?10:14, marginBottom: isMobile?12:18 }}>

        {/* LEFT: BAR CHART */}
        <div style={{ ...S.card, overflow: 'hidden' }}>
          <div style={{ ...S.cardHdr, flexWrap: 'wrap', gap: 8 }}>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
              <span style={{ ...S.cardTitle, textTransform: 'uppercase', letterSpacing: '.08em', fontSize: 10, color: '#6b7280' }}>
                Omzet & Laba per {chartView === 'bulanan' ? 'Bulan' : 'Minggu'}
              </span>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              {/* Legend */}
              <div style={{ display: 'flex', gap: 10 }}>
                {[['#b01c2e', 'Omzet'], ['#16a34a', 'Laba']].map(([col, lbl]) => (
                  <div key={lbl} style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 10, color: '#6b7280' }}>
                    <div style={{ width: 10, height: 10, borderRadius: 2, background: col }} />
                    {lbl}
                  </div>
                ))}
              </div>
              {/* Toggle */}
              <div style={{ display: 'flex', border: '1px solid #c8ccd4', borderRadius: 8, overflow: 'hidden' }}>
                {[['bulanan', 'Bulanan'], ['mingguan', 'Mingguan']].map(([v, l]) => (
                  <button key={v} onClick={() => setChartView(v)}
                    style={{ fontSize: 10, fontWeight: 700, padding: '4px 10px', border: 'none', cursor: 'pointer', fontFamily: "'Inter',sans-serif", background: chartView === v ? '#b01c2e' : '#f0f1f3', color: chartView === v ? '#fff' : '#6b7280', transition: 'all .15s' }}>
                    {l}
                  </button>
                ))}
              </div>
            </div>
          </div>

          {/* SVG Chart */}
          <div style={{ overflowX: 'auto', padding: '16px 16px 0' }}>
            <svg width={Math.max(totalW, 400)} height={CHART_H + LABEL_H + 10} style={{ display: 'block', fontFamily: "'Inter',sans-serif" }}>
              {/* Y Axis gridlines + labels */}
              {yTicks.map((v, i) => {
                const y = Math.round(((maxVal * 1.1 - v) / (maxVal * 1.1)) * CHART_H);
                return (
                  <g key={i}>
                    <line x1={Y_W} x2={totalW} y1={y} y2={y} stroke="#d1d5db" strokeWidth={1} />
                    <text x={Y_W - 6} y={y + 4} textAnchor="end" fill="#9ca3af" fontSize={9} fontWeight={600}>{rpM(v).replace('Rp ', '')}</text>
                  </g>
                );
              })}

              {/* Bars */}
              {chartData.map((d, i) => {
                const x = Y_W + 10 + i * (BAR_W * 2 + GAP + GROUP_GAP);
                const revH = Math.round((d.rev / (maxVal * 1.1)) * CHART_H);
                const labaH = d.laba > 0 ? Math.round((d.laba / (maxVal * 1.1)) * CHART_H) : 0;
                const revY = CHART_H - revH;
                const labaY = CHART_H - labaH;

                return (
                  <g key={d.label}>
                    {/* Omzet bar */}
                    <rect x={x} y={revY} width={BAR_W} height={revH} fill="#b01c2e" opacity={0.85} rx={2}>
                      <title>Omzet: {rpM(d.rev)}</title>
                    </rect>
                    {/* Laba bar */}
                    <rect x={x + BAR_W + GAP} y={labaY} width={BAR_W} height={labaH} fill="#16a34a" opacity={0.85} rx={2}>
                      <title>Laba: {rpM(d.laba)}</title>
                    </rect>
                    {/* Label */}
                    <text x={x + BAR_W + GAP / 2} y={CHART_H + 14} textAnchor="middle" fill="#6b7280" fontSize={chartView === 'bulanan' ? 9 : 7} fontWeight={600}>{d.label}</text>
                  </g>
                );
              })}

              {/* X axis line */}
              <line x1={Y_W} x2={totalW} y1={CHART_H} y2={CHART_H} stroke="#d1d5db" strokeWidth={1.5} />
            </svg>
          </div>
          <div style={{ height: 12 }} />
        </div>

        {/* RIGHT: HORIZONTAL BAR CHART */}
        <div style={{ ...S.card, overflow: 'hidden' }}>
          <div style={{ ...S.cardHdr, flexWrap: 'wrap', gap: 8 }}>
            <span style={{ ...S.cardTitle, textTransform: 'uppercase', letterSpacing: '.08em', fontSize: 10, color: '#6b7280' }}>Top 10 Produk</span>
            <div style={{ display: 'flex', border: '1px solid #c8ccd4', borderRadius: 8, overflow: 'hidden' }}>
              {[['laba', 'Laba'], ['omzet', 'Omzet'], ['laku', 'Terlaku']].map(([v, l]) => (
                <button key={v} onClick={() => setTopMode(v)}
                  style={{ fontSize: 10, fontWeight: 700, padding: '4px 10px', border: 'none', cursor: 'pointer', fontFamily: "'Inter',sans-serif", background: topMode === v ? '#b01c2e' : '#f0f1f3', color: topMode === v ? '#fff' : '#6b7280', transition: 'all .15s' }}>
                  {l}
                </button>
              ))}
            </div>
          </div>

          <div style={{ padding: '12px 16px 16px' }}>
            {topProds.map((p, i) => {
              const val = topMode === 'laku' ? p.qty : topMode === 'omzet' ? p.rev : p.laba;
              const pct = (val / maxTop) * 100;
              const barCol = topMode === 'laku' ? '#d97706' : topMode === 'omzet' ? '#b01c2e' : '#16a34a';
              return (
                <div key={p.kode} style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 7 }}>
                  <div style={{ width: 58, textAlign: 'right', fontFamily: "'Inter',sans-serif", fontWeight: 700, fontSize: 10, color: '#374151', flexShrink: 0 }}>{p.kode}</div>
                  <div style={{ flex: 1, height: 16, background: '#f0f1f3', borderRadius: 3, overflow: 'hidden' }}>
                    <div style={{ width: `${pct}%`, height: '100%', background: barCol, borderRadius: 3, transition: 'width .4s', opacity: 0.85 }} />
                  </div>
                  <div style={{ width: 52, fontFamily: "'Inter',sans-serif", fontWeight: 700, fontSize: 10, color: '#6b7280', flexShrink: 0, textAlign: 'right' }}>
                    {topMode === 'laku' ? `${val} pcs` : rpM(val)}
                  </div>
                </div>
              );
            })}
            {/* X axis labels */}
            <div style={{ display: 'flex', justifyContent: 'space-between', paddingLeft: 66, paddingRight: 58, marginTop: 4 }}>
              {[0, 0.25, 0.5, 0.75, 1].map(f => (
                <div key={f} style={{ fontSize: 8, color: '#6b7280', fontFamily: "'Inter',sans-serif" }}>
                  {topMode === 'laku' ? Math.round(maxTop * f) : rpM(Math.round(maxTop * f)).replace('Rp ', '')}
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>

      {/* ── SEGMENT COMPARISON: Online vs TM ── */}
      {(()=>{
        // Build segment stats per bulan
        const segData = allBulans.map(m => {
          const txM = TX.filter(t => t.bulan === m);
          const tmTxs = txM.filter(t => (t.segment||'TM') === 'TM');
          const mktTxs = txM.filter(t => (t.segment||'TM') === 'MKT');
          const calcRev = txs => txs.reduce((s,t) => s + t.harga * t.qty, 0);
          const calcLaba = txs => txs.reduce((s,t) => {
            const e = getEntry(t);
            return s + (t.harga * t.qty) - (e && e.hpp > 0 ? e.hpp * t.qty : 0);
          }, 0);
          return {
            m, label: (MSHORT[m]||`B${m}`),
            tmRev: calcRev(tmTxs), tmLaba: calcLaba(tmTxs), tmCount: tmTxs.length,
            mktRev: calcRev(mktTxs), mktLaba: calcLaba(mktTxs), mktCount: mktTxs.length,
          };
        });
        const maxSeg = Math.max(...segData.map(d => Math.max(d.tmRev + d.mktRev, 1)), 1);
        const totalTM = segData.reduce((s,d) => s + d.tmRev, 0);
        const totalMKT = segData.reduce((s,d) => s + d.mktRev, 0);
        const totalLabaTM = segData.reduce((s,d) => s + d.tmLaba, 0);
        const totalLabaMKT = segData.reduce((s,d) => s + d.mktLaba, 0);
        const totalCountTM = segData.reduce((s,d) => s + d.tmCount, 0);
        const totalCountMKT = segData.reduce((s,d) => s + d.mktCount, 0);

        return (
          <div style={{ display: 'grid', gridTemplateColumns: isMobile?'1fr':'1fr 1fr', gap: isMobile?10:14, marginBottom: isMobile?12:18 }}>
            {/* LEFT: Stacked bar Online vs TM per bulan */}
            <div style={{ ...S.card, overflow: 'hidden' }}>
              <div style={{ ...S.cardHdr }}>
                <span style={{ ...S.cardTitle, textTransform: 'uppercase', letterSpacing: '.08em', fontSize: 10, color: '#6b7280' }}>
                  Omzet: TM vs Marketplace per Bulan
                </span>
                <div style={{ display: 'flex', gap: 10 }}>
                  {[['#2563eb', '🏪 TM'], ['#9333ea', '🛒 MKT']].map(([col, lbl]) => (
                    <div key={lbl} style={{ display: 'flex', alignItems: 'center', gap: 4, fontSize: 9, color: '#6b7280' }}>
                      <div style={{ width: 10, height: 10, borderRadius: 2, background: col }} />{lbl}
                    </div>
                  ))}
                </div>
              </div>
              <div style={{ padding: '16px 16px 12px' }}>
                {segData.map((d, i) => {
                  const total = d.tmRev + d.mktRev;
                  const tmPct = total > 0 ? (d.tmRev / maxSeg) * 100 : 0;
                  const mktPct = total > 0 ? (d.mktRev / maxSeg) * 100 : 0;
                  return (
                    <div key={d.m} style={{ marginBottom: 14 }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                        <span style={{ fontSize: 11, fontWeight: 700, color: '#374151' }}>{MNAME[d.m]||`Bulan ${d.m}`}</span>
                        <span style={{ fontSize: 10, fontWeight: 600, color: '#6b7280' }}>{rpM(total)}</span>
                      </div>
                      <div style={{ display: 'flex', gap: 2, height: 22, borderRadius: 4, overflow: 'hidden', background: '#f0f1f3' }}>
                        <div style={{ width: `${tmPct}%`, background: '#2563eb', borderRadius: '4px 0 0 4px', transition: 'width .4s', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                          {tmPct > 15 && <span style={{ fontSize: 8, fontWeight: 700, color: '#fff' }}>{rpM(d.tmRev)}</span>}
                        </div>
                        <div style={{ width: `${mktPct}%`, background: '#9333ea', borderRadius: '0 4px 4px 0', transition: 'width .4s', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                          {mktPct > 15 && <span style={{ fontSize: 8, fontWeight: 700, color: '#fff' }}>{rpM(d.mktRev)}</span>}
                        </div>
                      </div>
                      <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 3 }}>
                        <span style={{ fontSize: 9, color: '#2563eb', fontWeight: 600 }}>TM: {d.tmCount} tx</span>
                        <span style={{ fontSize: 9, color: '#9333ea', fontWeight: 600 }}>MKT: {d.mktCount} tx</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* RIGHT: Summary cards TM vs MKT */}
            <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
              {/* TM Card */}
              <div style={{ ...S.card, borderLeft: '4px solid #2563eb', flex: 1 }}>
                <div style={{ padding: '14px 18px' }}>
                  <div style={{ fontSize: 9, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.08em', color: '#2563eb', marginBottom: 8 }}>🏪 TM (Toko Onsite)</div>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                    {[['Omzet', rpM(totalTM), '#374151'], ['Laba', rpM(totalLabaTM), '#16a34a'], ['Transaksi', totalCountTM + ' tx', '#6b7280'], ['Margin', totalTM > 0 ? ((totalLabaTM/totalTM)*100).toFixed(1)+'%' : '-', '#7c3aed']].map(([k,v,c]) => (
                      <div key={k}>
                        <div style={{ fontSize: 9, color: '#9ca3af', marginBottom: 2 }}>{k}</div>
                        <div style={{ fontFamily: "'Bricolage Grotesque',sans-serif", fontSize: 16, fontWeight: 800, color: c }}>{v}</div>
                      </div>
                    ))}
                  </div>
                  {totalTM + totalMKT > 0 && <div style={{ marginTop: 10 }}>
                    <div style={{ height: 6, background: '#f0f1f3', borderRadius: 4, overflow: 'hidden' }}>
                      <div style={{ width: `${(totalTM/(totalTM+totalMKT))*100}%`, height: '100%', background: '#2563eb', borderRadius: 4 }} />
                    </div>
                    <div style={{ fontSize: 9, color: '#6b7280', marginTop: 3, textAlign: 'right' }}>{((totalTM/(totalTM+totalMKT))*100).toFixed(1)}% dari total omzet</div>
                  </div>}
                </div>
              </div>
              {/* MKT Card */}
              <div style={{ ...S.card, borderLeft: '4px solid #9333ea', flex: 1 }}>
                <div style={{ padding: '14px 18px' }}>
                  <div style={{ fontSize: 9, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.08em', color: '#9333ea', marginBottom: 8 }}>🛒 Marketplace (Online)</div>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                    {[['Omzet', rpM(totalMKT), '#374151'], ['Laba', rpM(totalLabaMKT), '#16a34a'], ['Transaksi', totalCountMKT + ' tx', '#6b7280'], ['Margin', totalMKT > 0 ? ((totalLabaMKT/totalMKT)*100).toFixed(1)+'%' : '-', '#7c3aed']].map(([k,v,c]) => (
                      <div key={k}>
                        <div style={{ fontSize: 9, color: '#9ca3af', marginBottom: 2 }}>{k}</div>
                        <div style={{ fontFamily: "'Bricolage Grotesque',sans-serif", fontSize: 16, fontWeight: 800, color: c }}>{v}</div>
                      </div>
                    ))}
                  </div>
                  {totalTM + totalMKT > 0 && <div style={{ marginTop: 10 }}>
                    <div style={{ height: 6, background: '#f0f1f3', borderRadius: 4, overflow: 'hidden' }}>
                      <div style={{ width: `${(totalMKT/(totalTM+totalMKT))*100}%`, height: '100%', background: '#9333ea', borderRadius: 4 }} />
                    </div>
                    <div style={{ fontSize: 9, color: '#6b7280', marginTop: 3, textAlign: 'right' }}>{((totalMKT/(totalTM+totalMKT))*100).toFixed(1)}% dari total omzet</div>
                  </div>}
                </div>
              </div>
            </div>
          </div>
        );
      })()}

      {/* ── BEST SELLER vs SLOW MOVING ── */}
      {(()=>{
        const soldMap = {};
        TX.forEach(t => {
          const e = getEntry(t);
          const k = e ? e.kode : t.kode;
          if (!soldMap[k]) soldMap[k] = { kode: k, isDB: !!e, qty: 0, rev: 0, laba: 0 };
          soldMap[k].qty += t.qty;
          soldMap[k].rev += t.harga * t.qty;
          const hpp = e ? e.hpp * t.qty : 0;
          soldMap[k].laba += (t.harga * t.qty) - hpp;
        });
        const bestSellers = Object.values(soldMap).filter(p=>p.isDB).sort((a,b)=>b.qty-a.qty).slice(0,8);
        const maxBestQty = Math.max(...bestSellers.map(p=>p.qty),1);

        // Slow moving: produk di DB yang tidak terjual atau sedikit
        const dbProds = dbData || [];
        const slowMoving = dbProds
          .map(p => ({ ...p, sold: (soldMap[p.kode.toUpperCase()]||{}).qty || 0 }))
          .filter(p => p.sold < 3)
          .sort((a,b) => a.sold - b.sold)
          .slice(0, 8);

        return (
          <div style={{ display: 'grid', gridTemplateColumns: isMobile?'1fr':'1fr 1fr', gap: isMobile?10:14, marginBottom: isMobile?12:18 }}>
            {/* Best Seller */}
            <div style={{ ...S.card, overflow: 'hidden' }}>
              <div style={{ ...S.cardHdr }}>
                <span style={{ ...S.cardTitle }}>🔥 Best Seller (Qty)</span>
              </div>
              <div style={{ padding: '12px 16px' }}>
                {bestSellers.map((p, i) => (
                  <div key={p.kode} style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
                    <span style={{ width: 18, fontSize: 10, fontWeight: 800, color: i < 3 ? '#d97706' : '#9ca3af', textAlign: 'center' }}>{i + 1}</span>
                    <span style={{ width: 70, fontSize: 10, fontWeight: 700, color: '#374151', fontFamily: "'JetBrains Mono',monospace" }}>{p.kode}</span>
                    <div style={{ flex: 1, height: 14, background: '#f0f1f3', borderRadius: 3, overflow: 'hidden' }}>
                      <div style={{ width: `${(p.qty / maxBestQty) * 100}%`, height: '100%', background: i < 3 ? '#f59e0b' : '#16a34a', borderRadius: 3, opacity: 0.8 }} />
                    </div>
                    <span style={{ width: 45, fontSize: 10, fontWeight: 700, color: '#6b7280', textAlign: 'right' }}>{p.qty} pcs</span>
                  </div>
                ))}
              </div>
            </div>

            {/* Slow Moving */}
            <div style={{ ...S.card, overflow: 'hidden' }}>
              <div style={{ ...S.cardHdr }}>
                <span style={{ ...S.cardTitle }}>🐢 Slow Moving (Stok Tidak Laku)</span>
                <span style={{ fontSize: 9, color: '#dc2626', fontWeight: 600 }}>{slowMoving.length} produk</span>
              </div>
              <div style={{ padding: '12px 16px', maxHeight: 260, overflowY: 'auto' }}>
                {slowMoving.length === 0 ? (
                  <div style={{ textAlign: 'center', color: '#9ca3af', fontSize: 12, padding: 16 }}>Semua produk terjual!</div>
                ) : slowMoving.map(p => (
                  <div key={p.kode} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '5px 0', borderBottom: '1px solid #f0f1f3' }}>
                    <div>
                      <span style={{ fontSize: 11, fontWeight: 700, color: '#374151', fontFamily: "'JetBrains Mono',monospace" }}>{p.kode}</span>
                      {p.nama && <span style={{ fontSize: 9, color: '#9ca3af', marginLeft: 6 }}>{p.nama}</span>}
                    </div>
                    <span style={{ fontSize: 10, fontWeight: 700, color: p.sold === 0 ? '#dc2626' : '#d97706', background: p.sold === 0 ? 'rgba(220,38,38,.08)' : 'rgba(217,119,6,.08)', padding: '2px 8px', borderRadius: 20 }}>
                      {p.sold === 0 ? 'Belum terjual' : `${p.sold} pcs`}
                    </span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      })()}

      {/* ── CUSTOMER INSIGHTS (Marketplace) ── */}
      {(()=>{
        const mktTx = TX.filter(t => (t.segment||'TM') === 'MKT' && t.buyer);
        if (mktTx.length === 0) return null;
        const buyerMap = {};
        mktTx.forEach(t => {
          const b = (t.buyer||'').toUpperCase();
          if (!b) return;
          if (!buyerMap[b]) buyerMap[b] = { name: t.buyer, count: 0, total: 0 };
          buyerMap[b].count += t.qty;
          buyerMap[b].total += t.harga * t.qty;
        });
        const buyers = Object.values(buyerMap);
        const totalBuyers = buyers.length;
        const repeatBuyers = buyers.filter(b => b.count > 1);
        const repeatRate = totalBuyers > 0 ? (repeatBuyers.length / totalBuyers * 100) : 0;
        const topRepeat = [...repeatBuyers].sort((a,b) => b.total - a.total).slice(0, 8);

        return (
          <div style={{ ...S.card, overflow: 'hidden', marginBottom: isMobile?12:18 }}>
            <div style={{ ...S.cardHdr }}>
              <span style={{ ...S.cardTitle }}>👥 Customer Insights (Marketplace)</span>
            </div>
            <div style={{ padding: '14px 18px' }}>
              <div style={{ display: 'grid', gridTemplateColumns: isMobile?'repeat(2,1fr)':'repeat(4,1fr)', gap: 12, marginBottom: 14 }}>
                {[
                  ['Total Buyers', totalBuyers, '#2563eb'],
                  ['Repeat Buyers', repeatBuyers.length, '#16a34a'],
                  ['Repeat Rate', repeatRate.toFixed(1) + '%', '#9333ea'],
                  ['Avg/Buyer', rpM(Math.round(mktTx.reduce((s,t)=>s+t.harga*t.qty,0)/Math.max(totalBuyers,1))), '#d97706']
                ].map(([k,v,c]) => (
                  <div key={k} style={{ textAlign: 'center' }}>
                    <div style={{ fontSize: 9, color: '#9ca3af', marginBottom: 3, textTransform: 'uppercase', letterSpacing: '.06em' }}>{k}</div>
                    <div style={{ fontFamily: "'Bricolage Grotesque',sans-serif", fontSize: 20, fontWeight: 800, color: c }}>{v}</div>
                  </div>
                ))}
              </div>
              {topRepeat.length > 0 && (
                <div>
                  <div style={{ fontSize: 9, fontWeight: 700, color: '#6b7280', textTransform: 'uppercase', letterSpacing: '.06em', marginBottom: 8 }}>Top Repeat Customers</div>
                  {topRepeat.map((b, i) => (
                    <div key={b.name} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '4px 0', borderBottom: '1px solid #f0f1f3' }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                        <span style={{ fontSize: 9, fontWeight: 800, color: '#9ca3af', width: 16 }}>{i + 1}</span>
                        <span style={{ fontSize: 11, fontWeight: 600, color: '#374151' }}>{b.name}</span>
                      </div>
                      <div style={{ display: 'flex', gap: 10 }}>
                        <span style={{ fontSize: 10, color: '#6b7280' }}>{b.count} items</span>
                        <span style={{ fontSize: 10, fontWeight: 700, color: '#16a34a', fontFamily: "'JetBrains Mono',monospace" }}>{rpM(b.total)}</span>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        );
      })()}

      {/* ── PROGRESS BULANAN: Multi-view chart ── */}
      {allBulans.length > 0 && (()=>{
        const progData = allBulans.map(m => {
          const s = getStats(m);
          return { m, label: (MNAME[m]||`Bulan ${m}`), short: MSHORT[m]||`B${m}`, rev: s.rev, laba: s.laba, hpp: s.hpp, count: s.count, margin: s.margin, days: s.days };
        });
        const maxR = Math.max(...progData.map(d => d.rev), 1);
        const totalRev = progData.reduce((s,d) => s + d.rev, 0);

        // ── Segment data per bulan (shared) ──
        const segBulan = allBulans.map(m => {
          const txM = TX.filter(t=>t.bulan===m);
          const tmR = txM.filter(t=>(t.segment||'TM')==='TM').reduce((s,t)=>s+t.harga*t.qty,0);
          const mktR = txM.filter(t=>(t.segment||'TM')==='MKT').reduce((s,t)=>s+t.harga*t.qty,0);
          const tmC = txM.filter(t=>(t.segment||'TM')==='TM').length;
          const mktC = txM.filter(t=>(t.segment||'TM')==='MKT').length;
          return { m, tm: tmR, mkt: mktR, tmC, mktC };
        });
        const totalTM = segBulan.reduce((s,d)=>s+d.tm,0);
        const totalMKT = segBulan.reduce((s,d)=>s+d.mkt,0);

        // ── LINE CHART (2 charts side by side) ──
        const renderLine = () => {
          const PH = isMobile?140:200, halfW = isMobile?300:Math.max(280, 240), PL = 50, PR = 16, PT = 28, PB = 36;
          const xStep = progData.length > 1 ? (halfW - PL - PR) / (progData.length - 1) : 0;
          const toX = (i) => PL + i * xStep;
          const badge = (x,y,text,bg,anc) => {
            const w = text.length*6+14;
            const bx = anc==='start'?x+4:anc==='end'?x-w-4:x-w/2;
            return (<g><rect x={bx} y={y-10} width={w} height={16} rx={5} fill={bg} opacity={.92}/><text x={bx+w/2} y={y+1} textAnchor="middle" fill="#fff" fontSize={isMobile?7:9} fontWeight={700}>{text}</text></g>);
          };
          const makeChart = (title, lines, maxV, subtitle) => {
            const toY = v => PT + (1 - v / (maxV * 1.2)) * PH;
            return (
              <svg width={halfW} height={PH+PT+PB} style={{ display:'block', fontFamily:"'Inter',sans-serif" }}>
                <text x={PL} y={14} fill="#374151" fontSize={10} fontWeight={800}>{title}</text>
                {subtitle&&<text x={halfW-PR} y={14} textAnchor="end" fill="#9ca3af" fontSize={8}>{subtitle}</text>}
                {[0,.5,1].map(f=>{const v=maxV*1.2*f,y=toY(v);return(<g key={f}><line x1={PL} x2={halfW-PR} y1={y} y2={y} stroke="#f0f1f3" strokeWidth={1}/><text x={PL-6} y={y+3} textAnchor="end" fill="#d1d5db" fontSize={7}>{rpM(Math.round(v)).replace('Rp ','')}</text></g>);})}
                {/* Area for first line */}
                <path d={lines[0].data.map((v,i)=>`${i===0?'M':'L'}${toX(i)},${toY(v)}`).join(' ')+` L${toX(lines[0].data.length-1)},${PT+PH} L${toX(0)},${PT+PH} Z`} fill={lines[0].col} opacity={.08}/>
                {/* Lines */}
                {lines.map((ln,li)=>(
                  <path key={li} d={ln.data.map((v,i)=>`${i===0?'M':'L'}${toX(i)},${toY(v)}`).join(' ')} fill="none" stroke={ln.col} strokeWidth={ln.bold?3:2.5} strokeLinecap="round" strokeLinejoin="round" strokeDasharray={ln.dash||''}/>
                ))}
                {/* Dots + labels */}
                {lines[0].data.map((_,i)=>{
                  const anc = lines[0].data.length===1?'middle':i===0?'start':i===lines[0].data.length-1?'end':'middle';
                  return(<g key={i}>
                    <line x1={toX(i)} x2={toX(i)} y1={PT} y2={PT+PH} stroke="#f5f5f5" strokeWidth={1}/>
                    {lines.map((ln,li)=>(
                      <g key={li}>
                        <circle cx={toX(i)} cy={toY(ln.data[i])} r={li===0?6:5} fill={ln.col} stroke="#fff" strokeWidth={2}/>
                        {badge(toX(i), toY(ln.data[i])+(li===0?-16:18), `${ln.label?ln.label+' ':''}${rpM(ln.data[i])}`, ln.col, anc)}
                      </g>
                    ))}
                    <text x={toX(i)} y={PT+PH+14} textAnchor="middle" fill="#374151" fontSize={10} fontWeight={700}>{progData[i]?.short||''}</text>
                    {i>0&&(()=>{const g=lines[0].data[i-1]>0?((lines[0].data[i]-lines[0].data[i-1])/lines[0].data[i-1]*100):0;return <text x={toX(i)} y={PT+PH+26} textAnchor="middle" fill={g>=0?'#16a34a':'#dc2626'} fontSize={8} fontWeight={700}>{g>=0?'+':''}{g.toFixed(0)}%</text>;})()}
                  </g>);
                })}
              </svg>
            );
          };
          const maxSeg = Math.max(...segBulan.map(d=>Math.max(d.tm,d.mkt)),1);
          return (
            <div style={{ display:'flex', flexDirection:isMobile?'column':'row', gap:isMobile?12:20, padding:'12px 16px', overflowX:'auto', justifyContent:'center' }}>
              {makeChart('Omzet & Laba',
                [
                  {data:progData.map(d=>d.rev), col:'#e63946', bold:true, label:''},
                  {data:progData.map(d=>d.laba), col:'#16a34a', label:''},
                ], maxR)}
              {makeChart('TM vs Marketplace',
                [
                  {data:segBulan.map(d=>d.tm), col:'#2563eb', bold:true, label:'TM'},
                  {data:segBulan.map(d=>d.mkt), col:'#9333ea', dash:'6,3', label:'MKT'},
                ], maxSeg)}
            </div>
          );
        };

        // ── BAR CHART ──
        const renderBar = () => (
          <div style={{ padding: isMobile?'8px 4px':'12px 12px' }}>
            {progData.map((d, i) => {
              const prevD = i>0?progData[i-1]:null;
              const revGrowth = prevD&&prevD.rev>0?((d.rev-prevD.rev)/prevD.rev*100):null;
              const revPct = (d.rev/(maxR*1.05))*100;
              const labaPct = (d.laba/(maxR*1.05))*100;
              return (
                <div key={d.m} style={{ marginBottom: i<progData.length-1?16:0 }}>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6 }}>
                    <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                      <span style={{ fontFamily:"'Bricolage Grotesque',sans-serif", fontSize:isMobile?13:15, fontWeight:800, color:'#111827' }}>{d.label}</span>
                      {revGrowth!==null&&<span style={{ fontSize:10, fontWeight:700, padding:'2px 8px', borderRadius:20, background:revGrowth>=0?'rgba(22,163,74,.1)':'rgba(220,38,38,.08)', color:revGrowth>=0?'#16a34a':'#dc2626' }}>{revGrowth>=0?'↑':'↓'}{Math.abs(revGrowth).toFixed(0)}%</span>}
                    </div>
                    <span style={{ fontSize:10, color:'#9ca3af' }}>{d.count} tx · {d.margin.toFixed(1)}%</span>
                  </div>
                  <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:5 }}>
                    <span style={{ width:isMobile?40:50, fontSize:9, fontWeight:600, color:'#e63946', textAlign:'right', flexShrink:0 }}>Omzet</span>
                    <div style={{ flex:1, height:22, background:'#fef2f2', borderRadius:6, overflow:'hidden' }}>
                      <div style={{ width:`${revPct}%`, height:'100%', background:'linear-gradient(90deg,#e63946,#f87171)', borderRadius:6, transition:'width .5s', display:'flex', alignItems:'center', justifyContent:'flex-end', paddingRight:8 }}>
                        <span style={{ fontSize:isMobile?9:10, fontWeight:800, color:'#fff', textShadow:'0 1px 2px rgba(0,0,0,.3)' }}>{rpM(d.rev)}</span>
                      </div>
                    </div>
                  </div>
                  <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                    <span style={{ width:isMobile?40:50, fontSize:9, fontWeight:600, color:'#16a34a', textAlign:'right', flexShrink:0 }}>Laba</span>
                    <div style={{ flex:1, height:18, background:'#f0fdf4', borderRadius:6, overflow:'hidden' }}>
                      <div style={{ width:`${labaPct}%`, height:'100%', background:'linear-gradient(90deg,#16a34a,#4ade80)', borderRadius:6, transition:'width .5s', display:'flex', alignItems:'center', justifyContent:'flex-end', paddingRight:8 }}>
                        <span style={{ fontSize:isMobile?8:9, fontWeight:700, color:'#fff', textShadow:'0 1px 2px rgba(0,0,0,.3)' }}>{rpM(d.laba)}</span>
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        );

        // ── PIE CHART (TM vs MKT donut + per-month donut) ──
        const renderPie = () => {
          const makePie = (data, cx, cy, r, title, subtitle) => {
            const total = data.reduce((s,d)=>s+d.val,0);
            let cum = -90;
            const slices = data.map(d => {
              const pct = total>0?d.val/total:0;
              const ang = pct*360;
              const sa = cum; cum+=ang;
              const sr = sa*Math.PI/180, er = cum*Math.PI/180;
              const mr = (sa+ang/2)*Math.PI/180;
              return {...d, pct, sa, x1:cx+r*Math.cos(sr), y1:cy+r*Math.sin(sr), x2:cx+r*Math.cos(er), y2:cy+r*Math.sin(er), la:ang>180?1:0, mr, lx:cx+(r+28)*Math.cos(mr), ly:cy+(r+28)*Math.sin(mr)};
            });
            return (<g>
              {slices.map((s,i)=>{
                if(s.pct<=0)return null;
                if(s.pct>=.999)return <circle key={i} cx={cx} cy={cy} r={r} fill={s.col}/>;
                return(<g key={i}>
                  <path d={`M${cx},${cy} L${s.x1},${s.y1} A${r},${r} 0 ${s.la},1 ${s.x2},${s.y2} Z`} fill={s.col} stroke="#fff" strokeWidth={2.5}/>
                  {s.pct>.08&&<><line x1={cx+(r-8)*Math.cos(s.mr)} y1={cy+(r-8)*Math.sin(s.mr)} x2={s.lx} y2={s.ly} stroke={s.col} strokeWidth={1.5} opacity={.4}/>
                  <text x={s.lx+(s.lx>cx?5:-5)} y={s.ly+4} textAnchor={s.lx>cx?'start':'end'} fill="#374151" fontSize={isMobile?8:10} fontWeight={700}>{s.name}</text>
                  <text x={s.lx+(s.lx>cx?5:-5)} y={s.ly+16} textAnchor={s.lx>cx?'start':'end'} fill="#6b7280" fontSize={isMobile?7:9}>{(s.pct*100).toFixed(1)}% · {rpM(s.val)}</text></>}
                </g>);
              })}
              <circle cx={cx} cy={cy} r={r*.52} fill="#fff"/>
              <text x={cx} y={cy-4} textAnchor="middle" fill="#111827" fontSize={isMobile?9:11} fontWeight={800} fontFamily="'Bricolage Grotesque',sans-serif">{title}</text>
              <text x={cx} y={cy+10} textAnchor="middle" fill="#6b7280" fontSize={isMobile?8:10} fontWeight={600}>{subtitle}</text>
            </g>);
          };
          const P1CX = isMobile?120:170, P2CX = isMobile?120:520, PCY = isMobile?120:130;
          const PR = isMobile?65:85;
          const SVGW = isMobile?250:700, SVGH = isMobile?250:280;
          const tmMktData = [{name:'TM (Toko)',val:totalTM,col:'#2563eb'},{name:'MKT (Online)',val:totalMKT,col:'#9333ea'}];
          const monthColors = ['#e63946','#f59e0b','#3b82f6','#8b5cf6','#06b6d4','#ec4899'];
          const monthData = progData.map((d,i)=>({name:d.short,val:d.rev,col:monthColors[i%6]}));
          return (
            <div style={{ padding:isMobile?'16px 8px':'24px 20px' }}>
              {isMobile?(
                <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:20 }}>
                  <svg width={SVGW} height={SVGH}>{makePie(tmMktData, P1CX, PCY, PR, 'Channel', rpM(totalRev))}</svg>
                  <svg width={SVGW} height={SVGH}>{makePie(monthData, P1CX, PCY, PR, 'Bulanan', rpM(totalRev))}</svg>
                </div>
              ):(
                <svg width={SVGW} height={SVGH} style={{ display:'block', margin:'0 auto' }}>
                  {makePie(tmMktData, P1CX, PCY, PR, 'Channel', rpM(totalRev))}
                  {makePie(monthData, P2CX, PCY, PR, 'Bulanan', rpM(totalRev))}
                </svg>
              )}
            </div>
          );
        };

        // ── PER BULAN (grouped bar: Omzet breakdown TM vs MKT per bulan) ──
        const renderPerBulan = () => {
          const segBulan = allBulans.map(m => {
            const txM = TX.filter(t=>t.bulan===m);
            const tmR = txM.filter(t=>(t.segment||'TM')==='TM').reduce((s,t)=>s+t.harga*t.qty,0);
            const mktR = txM.filter(t=>(t.segment||'TM')==='MKT').reduce((s,t)=>s+t.harga*t.qty,0);
            return { m, label: MNAME[m]||`Bulan ${m}`, short: MSHORT[m]||`B${m}`, tm: tmR, mkt: mktR, total: tmR+mktR };
          });
          const maxSB = Math.max(...segBulan.map(d=>d.total),1);
          const BW = isMobile?28:40, GAP = isMobile?4:6, GG = isMobile?30:50;
          const CH = isMobile?160:200, YW = 52;
          const totalSW = segBulan.length*(BW*2+GAP+GG)+YW+20;
          const yTx = [0,.25,.5,.75,1].map(f=>Math.round(maxSB*1.1*f));
          return (
            <div style={{ overflowX:'auto', padding:'12px 16px' }}>
              <svg width={Math.max(totalSW,300)} height={CH+50} style={{ display:'block', fontFamily:"'Inter',sans-serif" }}>
                {yTx.map((v,i)=>{const y=10+(1-v/(maxSB*1.1))*CH;return(<g key={i}><line x1={YW} x2={totalSW} y1={y} y2={y} stroke="#f0f1f3" strokeWidth={1}/><text x={YW-6} y={y+3} textAnchor="end" fill="#c8ccd4" fontSize={8}>{rpM(v).replace('Rp ','')}</text></g>);})}
                {segBulan.map((d,i)=>{
                  const x = YW+10+i*(BW*2+GAP+GG);
                  const tmH = (d.tm/(maxSB*1.1))*CH;
                  const mktH = (d.mkt/(maxSB*1.1))*CH;
                  return(<g key={d.m}>
                    <rect x={x} y={10+CH-tmH} width={BW} height={tmH} fill="#2563eb" rx={3} opacity={0.85}><title>TM: {rpM(d.tm)}</title></rect>
                    <rect x={x+BW+GAP} y={10+CH-mktH} width={BW} height={mktH} fill="#9333ea" rx={3} opacity={0.85}><title>MKT: {rpM(d.mkt)}</title></rect>
                    {tmH>20&&<text x={x+BW/2} y={10+CH-tmH+14} textAnchor="middle" fill="#fff" fontSize={8} fontWeight={700}>{rpM(d.tm)}</text>}
                    {mktH>20&&<text x={x+BW+GAP+BW/2} y={10+CH-mktH+14} textAnchor="middle" fill="#fff" fontSize={8} fontWeight={700}>{rpM(d.mkt)}</text>}
                    <text x={x+BW+GAP/2} y={10+CH+16} textAnchor="middle" fill="#374151" fontSize={10} fontWeight={700}>{d.short}</text>
                    <text x={x+BW+GAP/2} y={10+CH+28} textAnchor="middle" fill="#9ca3af" fontSize={8}>{rpM(d.total)}</text>
                  </g>);
                })}
                <line x1={YW} x2={totalSW} y1={10+CH} y2={10+CH} stroke="#e2e4e8" strokeWidth={1.5}/>
              </svg>
            </div>
          );
        };

        // ── Dynamic legend based on view ──
        const legendMap = {
          line: [['#e63946','Omzet'],['#16a34a','Laba'],['#2563eb','TM'],['#9333ea','MKT']],
          bar: [['#e63946','Omzet'],['#16a34a','Laba']],
          pie: [['#2563eb','TM'],['#9333ea','MKT']],
          perbulan: [['#2563eb','TM'],['#9333ea','MKT']],
        };

        return (
          <div style={{ ...S.card, overflow:'hidden', marginBottom: isMobile?12:18 }}>
            <div style={{ ...S.cardHdr, flexWrap:'wrap', gap:8 }}>
              <span style={{ ...S.cardTitle }}>Progress Bulanan</span>
              <div style={{ display:'flex', alignItems:'center', gap:8, flexWrap:'wrap' }}>
                {/* Legend */}
                {(legendMap[progView]||[]).length>0&&<div style={{ display:'flex', gap:8, marginRight:4 }}>
                  {(legendMap[progView]||[]).map(([c,l])=>(
                    <span key={l} style={{ fontSize:isMobile?8:9, fontWeight:600, color:c, display:'flex', alignItems:'center', gap:3 }}><span style={{ width:7, height:7, borderRadius:2, background:c, display:'inline-block' }}/>{l}</span>
                  ))}
                </div>}
                {/* View toggle */}
                <div style={{ display:'flex', border:'1.5px solid #e2e4e8', borderRadius:8, overflow:'hidden' }}>
                  {[['line','📈 Line'],['bar','📊 Bar'],['pie','🥧 Pie'],['perbulan','📅 Per Bulan']].map(([v,l])=>(
                    <button key={v} onClick={()=>setProgView(v)} style={{ fontSize:isMobile?8:9, fontWeight:700, padding:isMobile?'4px 7px':'4px 10px', border:'none', cursor:'pointer', fontFamily:"'Inter',sans-serif", background:progView===v?'#b01c2e':'#fff', color:progView===v?'#fff':'#6b7280', transition:'all .15s' }}>{l}</button>
                  ))}
                </div>
              </div>
            </div>
            {progView==='line'&&renderLine()}
            {progView==='bar'&&renderBar()}
            {progView==='pie'&&renderPie()}
            {progView==='perbulan'&&renderPerBulan()}
          </div>
        );
      })()}

      {/* RINGKASAN BULANAN */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit,minmax(220px,1fr))', gap: 12 }}>
        {allBulans.map(m => {
          const s = getStats(m);
          return (
            <div key={m} style={{ ...S.card, borderTop: `3px solid ${MCOL[m] || '#e63946'}` }}>
              <div style={{ padding: '12px 16px 0' }}>
                <div style={{ fontFamily: "'Inter',sans-serif", fontSize: 11, fontWeight: 800, color: MCOL[m] || '#b01c2e', marginBottom: 10, display: 'flex', alignItems: 'center', gap: 5 }}>
                  <span style={{ width: 7, height: 7, borderRadius: '50%', background: MCOL[m] || '#b01c2e', display: 'inline-block' }} />
                  {MNAME[m] || `Bulan ${m}`}
                </div>
              </div>
              {(()=>{
                const prevIdx = allBulans.indexOf(m)-1;
                const prevM = prevIdx>=0?allBulans[prevIdx]:null;
                const prevS = prevM?getStats(prevM):null;
                const growth = prevS&&prevS.rev>0?((s.rev-prevS.rev)/prevS.rev*100):null;
                const tgt = targetOmzet&&targetOmzet[m]>0?targetOmzet[m]:null;
                const tgtPct = tgt?Math.min((s.rev/tgt)*100,100):null;
                return(<>
                  {/* Forecast: daily avg × 30 days */}
                  {(()=>{
                    const dailyAvg = s.days > 0 ? s.rev / s.days : 0;
                    const forecast = Math.round(dailyAvg * 30);
                    const forecastLaba = s.days > 0 ? Math.round(s.laba / s.days * 30) : 0;
                    const fRows = [['Omzet', rpM(s.rev), MCOL[m]||'#e63946'], ['HPP', rpM(s.hpp), 'rgba(241,241,240,.4)'], ['Laba', rpM(s.laba), s.laba>=0?'#16a34a':'#dc2626'], ['Margin', s.margin.toFixed(1)+'%', '#c084fc'], ['Transaksi', s.count+'', 'rgba(241,241,240,.7)'], ['Hari Aktif', s.days+' hari', 'rgba(241,241,240,.4)']];
                    if(s.days>3) fRows.push(['📈 Forecast/bln', rpM(forecast), '#0891b2']);
                    return fRows;
                  })().map(([k,v,col])=>(
                    <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'6px 16px',borderBottom:'1px solid #e2e4e8',alignItems:'center'}}>
                      <span style={{fontSize:11,color:'#6b7280',fontFamily:"'DM Sans',sans-serif"}}>{k}</span>
                      <div style={{display:'flex',alignItems:'center',gap:6}}>
                        {k==='Omzet'&&growth!==null&&<span style={{fontSize:9,fontWeight:700,padding:'1px 5px',borderRadius:20,background:growth>=0?'rgba(22,163,74,.1)':'rgba(220,38,38,.08)',color:growth>=0?'#16a34a':'#dc2626'}}>{growth>=0?'↑':'↓'}{Math.abs(growth).toFixed(0)}%</span>}
                        <span style={{fontFamily:"'Inter',sans-serif",fontWeight:700,fontSize:11,color:col}}>{v}</span>
                      </div>
                    </div>
                  ))}
                  {tgt&&(
                    <div style={{padding:'8px 16px 10px'}}>
                      <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                        <span style={{fontSize:9,color:'#6b7280',fontFamily:"'DM Sans',sans-serif",textTransform:'uppercase',letterSpacing:'.06em'}}>Target</span>
                        <span style={{fontSize:9,fontWeight:700,color:tgtPct>=100?'#4ade80':tgtPct>=80?'#fbbf24':'rgba(241,241,240,.4)',fontFamily:"'DM Sans',sans-serif"}}>{rpM(tgt)} · {tgtPct.toFixed(0)}%</span>
                      </div>
                      <div style={{height:4,background:'#f0f1f3',borderRadius:4,overflow:'hidden'}}>
                        <div style={{width:`${tgtPct}%`,height:'100%',background:tgtPct>=100?'#16a34a':tgtPct>=80?'#d97706':'#dc2626',borderRadius:4,transition:'width .5s'}}/>
                      </div>
                    </div>
                  )}
                  {!tgt&&<div style={{height:5}}/>}
                  <div style={{padding:'8px 16px',borderTop:'1px solid #e2e4e8',display:'flex',justifyContent:'flex-end',gap:6}}>
                    <button style={{fontSize:9,fontWeight:700,padding:'3px 9px',borderRadius:7,border:'1px solid rgba(220,38,38,.2)',background:'rgba(220,38,38,.07)',color:'#dc2626',cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}} onClick={()=>generatePDF(m)}>📄 PDF</button>
                    <button style={{fontSize:9,fontWeight:700,padding:'3px 9px',borderRadius:7,border:'1px solid rgba(96,165,250,.2)',background:'rgba(96,165,250,.07)',color:'#2563eb',cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}} onClick={()=>exportCSV(m)}>↓ Export</button>
                  </div>
                </>);
              })()}
            </div>
          );
        })}
      </div>
    </div>
  );
}



// ── BULANAN PAGE (merge Monthly + Daily) ─────────────────────
function BulananPage({TX,monthFilter,setMonthFilter,allBulans,getStats,getEntry,getStatus,applyFix,editTx,deleteTx,exportCSV,generatePDF,targetOmzet,rp,rpM,S,MNAME,MSHORT,MCOL,isMobile=false}){
  const [open,setOpen]=useState({});
  const [view,setView]=useState('summary'); // 'summary' or 'detail'
  const s=getStats(monthFilter);
  const src=monthFilter===0?TX:TX.filter(t=>t.bulan===monthFilter);

  // Group by bulan+tgl
  const dm={};
  src.forEach(t=>{const k=`${t.bulan}|${t.tgl}`;if(!dm[k])dm[k]={bulan:t.bulan,tgl:t.tgl,txs:[]};dm[k].txs.push(t);});
  const days=Object.values(dm).sort((a,b)=>a.bulan!==b.bulan?a.bulan-b.bulan:a.tgl-b.tgl);

  return(<>
    <MonthPills bulans={allBulans} current={monthFilter} onChange={setMonthFilter} MNAME={MNAME} MCOL={MCOL}/>

    {/* STAT CARDS */}
    <div style={S.statsGrid}>
      {[{l:'Pendapatan',v:rpM(s.rev),c:'#3b82f6'},{l:'HPP',v:rpM(s.hpp),c:'#d97706'},{l:'Laba',v:rpM(s.laba),c:'#16a34a'},{l:'Margin',v:s.margin.toFixed(1)+'%',c:'#7c3aed'},{l:'Transaksi',v:s.count,c:'#b01c2e'},{l:'Hari Aktif',v:s.days+' hari',c:'#0891b2'}].map(x=>(
        <div key={x.l} style={S.statCard(x.c)}><div style={S.statLbl}>{x.l}</div><div style={S.statVal}>{x.v}</div></div>
      ))}
    </div>

    {/* VIEW TOGGLE */}
    <div style={{display:'flex',gap:6,marginBottom:14}}>
      <button style={{...S.btn(view==='summary'),fontSize:11}} onClick={()=>setView('summary')}>📊 Ringkasan per Tanggal</button>
      <button style={{...S.btn(view==='detail'),fontSize:11}} onClick={()=>setView('detail')}>📋 Detail Transaksi</button>
    </div>

    {/* SUMMARY VIEW */}
    {view==='summary'&&(
      <div style={S.card}>
        <div style={S.tblWrap}>
          <table style={S.tbl}>
            <thead><tr><th style={S.th}>Bln</th><th style={{...S.th,textAlign:'center'}}>Tgl</th><th style={S.thr}>Item</th><th style={S.thr}>Pendapatan</th><th style={S.thr}>HPP</th><th style={S.thr}>Laba</th><th style={S.thr}>Margin</th></tr></thead>
            <tbody>{days.map(({bulan,tgl,txs})=>{
              const rev=txs.reduce((s,t)=>s+t.harga*t.qty,0);
              const hpp=txs.reduce((s,t)=>{const e=getEntry(t);return s+(e?e.hpp*t.qty:0);},0);
              const lb=rev-hpp;const mg=rev>0?(lb/rev*100):0;
              return(
                <tr key={`${bulan}-${tgl}`} style={{cursor:'pointer',borderBottom:'1px solid #e2e4e8'}}
                  onClick={()=>{setView('detail');setOpen(p=>({...p,[`${bulan}|${tgl}`]:true}));}}
                  onMouseEnter={e=>e.currentTarget.style.background='#f8f9fb'}
                  onMouseLeave={e=>e.currentTarget.style.background=''}>
                  <td style={S.td}><span style={{...S.badge(bulan),fontSize:9}}>{MSHORT[bulan]||bulan}</span></td>
                  <td style={{...S.td,textAlign:'center',fontFamily:"'Inter',sans-serif",fontWeight:700}}>{tgl}</td>
                  <td style={S.tdr}>{txs.length}</td>
                  <td style={S.tdr}>{rp(rev)}</td>
                  <td style={S.tdr}>{rp(hpp)}</td>
                  <td style={{...S.tdr,color:lb>=0?'#16a34a':'#dc2626',fontWeight:700}}>{rp(lb)}</td>
                  <td style={S.tdr}>{mg.toFixed(1)}%</td>
                </tr>
              );
            })}</tbody>
          </table>
        </div>
      </div>
    )}

    {/* DETAIL VIEW — accordion per hari */}
    {view==='detail'&&(
      <div style={S.card}>
        {days.map(({bulan,tgl,txs})=>{
          const key=`${bulan}|${tgl}`;const io=!!open[key];
          const rev=txs.reduce((s,t)=>s+t.harga*t.qty,0);
          const hpp=txs.reduce((s,t)=>{const e=getEntry(t);return s+(e?e.hpp*t.qty:0);},0);
          const lb=rev-hpp;
          const iss=txs.filter(t=>getStatus(t)!=='ok').length;
          return(
            <div key={key} style={{borderBottom:'1px solid #e2e4e8'}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 18px',cursor:'pointer',background:io?'#f0f1f3':'#ffffff'}}
                onClick={()=>setOpen(p=>({...p,[key]:!p[key]}))}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{...S.badge(bulan),fontSize:9}}>{MSHORT[bulan]||bulan}</span>
                  <span style={{fontFamily:"'Inter',sans-serif",fontWeight:800,fontSize:13}}>{tgl} {MNAME[bulan]||`Bln ${bulan}`}</span>
                  <span style={{fontSize:9,fontWeight:700,padding:'2px 7px',borderRadius:20,background:'rgba(22,163,74,.1)',color:'#16a34a',border:'1px solid rgba(22,163,74,.25)'}}>{txs.length} item</span>
                  {iss>0&&<span style={{fontSize:9,fontWeight:700,padding:'2px 7px',borderRadius:20,background:'rgba(217,119,6,.1)',color:'#d97706',border:'1px solid rgba(217,119,6,.2)'}}>⚠️ {iss}</span>}
                </div>
                <div style={{display:'flex',alignItems:'center',gap:16}}>
                  <div style={{textAlign:'right'}}><div style={{fontSize:9,color:'#6b7280'}}>Pendapatan</div><div style={{fontFamily:"'Inter',sans-serif",fontWeight:800,fontSize:12}}>{rp(rev)}</div></div>
                  <div style={{textAlign:'right'}}><div style={{fontSize:9,color:'#6b7280'}}>Laba</div><div style={{fontFamily:"'Inter',sans-serif",fontWeight:800,fontSize:12,color:lb>=0?'#16a34a':'#dc2626'}}>{rp(lb)}</div></div>
                  <span style={{color:'#6b7280',fontSize:12,transform:`rotate(${io?0:-90}deg)`,display:'inline-block',transition:'transform .2s'}}>▼</span>
                </div>
              </div>
              {io&&(
                <div style={{overflowX:'auto',borderTop:'1px solid #e2e4e8'}}>
                  <table style={{...S.tbl,fontSize:11}}>
                    <thead><tr><th style={S.th}>#</th><th style={S.th}>Kode</th><th style={S.th}>Warna</th><th style={S.th}>Size</th><th style={{...S.th,textAlign:'center'}}>Qty</th><th style={S.thr}>HPP</th><th style={S.thr}>Harga 40%</th><th style={S.thr}>Harga Transaksi</th><th style={S.thr}>Laba</th><th style={S.th}>St</th><th style={S.th}>Ket</th></tr></thead>
                    <tbody>
                      {txs.map((t,i)=>{const e=getEntry(t);const st=getStatus(t);const tJ=t.harga*t.qty;const lI=e?tJ-e.hpp*t.qty:null;
                        return <EditableRow key={t.idx} t={t} i={i} e={e} st={st} tJual={tJ} lItem={lI} rowBg={e&&t.harga>0&&t.harga<e.hpp?'#fff0f0':st!=='ok'&&!e?(st==='warn'?'#fffbeb':'#fff5f5'):''} applyFix={applyFix} editTx={editTx} deleteTx={deleteTx} S={S} rp={rp}/>;
                      })}
                      <tr style={{background:'#f0f1f3',borderTop:'2px solid #e5e7eb'}}>
                        <td colSpan={4} style={{...S.td,fontFamily:"'Inter',sans-serif",fontWeight:800,fontSize:10,textTransform:'uppercase',color:'#374151'}}>TOTAL {tgl} {(MNAME[bulan]||'BLN '+bulan).toUpperCase()}</td>
                        <td style={{...S.td,textAlign:'center',fontFamily:"'Inter',sans-serif",fontWeight:800}}>{txs.reduce((s,t)=>s+t.qty,0)}</td>
                        <td colSpan={2} style={S.td}/>
                        <td style={{...S.tdr,fontFamily:"'Inter',sans-serif",fontWeight:800,color:'#b01c2e'}}>{rp(rev)}</td>
                        <td style={{...S.tdr,fontFamily:"'Inter',sans-serif",fontWeight:800,color:lb>=0?'#16a34a':'#dc2626'}}>{rp(lb)}</td>
                        <td colSpan={2}/>
                      </tr>
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          );
        })}
      </div>
    )}
  </>);
}

// ── TRANSAKSI PAGE (fokus koreksi kode) ──────────────────────
function TxPage({TX,txFilter,setTxFilter,search,setSearch,getEntry,getStatus,applyFix,editHarga,editTx,deleteTx,rp,S,MSHORT,isMobile=false}){
  const [sortCol, setSortCol] = useState('');
  const [sortDir, setSortDir] = useState('asc');
  const [viewMode, setViewMode] = useState('group'); // 'group' | 'list'
  const [bulanFilter, setBulanFilter] = useState(0);
  const [expandedGroups, setExpandedGroups] = useState({});

  const issues   = TX.filter(t=>getStatus(t)!=='ok');
  const warnList = TX.filter(t=>getStatus(t)==='warn');
  const missList = TX.filter(t=>getStatus(t)==='miss');
  const rugiList = TX.filter(t=>{ const e=getEntry(t); return e&&t.harga>0&&t.harga<e.hpp; });

  // ── ESTIMATED LABA HILANG ─────────────────────────────────
  const labaHilang = issues.reduce((s,t)=>{
    const e=getEntry(t);
    if(!e) return s; // kode miss = HPP unknown, can't compute
    const potensi = (t.harga - e.hpp) * t.qty;
    return s + potensi;
  },0);
  const hppTidakDiketahui = missList.reduce((s,t)=>s+t.harga*t.qty,0);

  // ── FILTERED LIST ─────────────────────────────────────────
  let list = TX;
  if(txFilter==='issues') list = issues;
  else if(txFilter==='warn') list = warnList;
  else if(txFilter==='miss') list = missList;
  else if(txFilter==='ok') list = TX.filter(t=>getStatus(t)==='ok');
  else if(txFilter==='rugi') list = rugiList;
  if(bulanFilter>0) list = list.filter(t=>t.bulan===bulanFilter);
  if(search) list = list.filter(t=>
    t.kode.toLowerCase().includes(search.toLowerCase()) ||
    (t.warna||'').toLowerCase().includes(search.toLowerCase()) ||
    (t.ket||'').toLowerCase().includes(search.toLowerCase()) ||
    String(t.tgl).includes(search)
  );

  // ── SORT ──────────────────────────────────────────────────
  const handleSort = (col) => {
    if(sortCol===col) setSortDir(d=>d==='asc'?'desc':'asc');
    else { setSortCol(col); setSortDir('asc'); }
  };
  const sorted = [...list].sort((a,b)=>{
    if(!sortCol) return 0;
    let va=a[sortCol], vb=b[sortCol];
    if(sortCol==='status'){ va=getStatus(a); vb=getStatus(b); }
    if(typeof va==='string') return sortDir==='asc'?va.localeCompare(vb):vb.localeCompare(va);
    return sortDir==='asc'?(va-vb):(vb-va);
  });

  // ── GROUP BY KODE (for issues view) ──────────────────────
  const grouped = {};
  issues.filter(t=>bulanFilter===0||t.bulan===bulanFilter).forEach(t=>{
    const k=t.kode;
    if(!grouped[k]) grouped[k]={kode:k,txs:[],st:getStatus(t),match:t.match};
    grouped[k].txs.push(t);
  });
  const groupList = Object.values(grouped).sort((a,b)=>b.txs.length-a.txs.length);

  const allBulans = [...new Set(TX.map(t=>t.bulan))].sort((a,b)=>a-b);
  const rev = sorted.reduce((s,t)=>s+t.harga*t.qty,0);

  // ── SORT HEADER ───────────────────────────────────────────
  const SortTh = ({col, label, right}) => (
    <th style={right?S.thr:S.th} onClick={()=>handleSort(col)}
      title={`Sort by ${label}`}
      onMouseEnter={e=>e.currentTarget.style.cursor='pointer'}
    >
      {label} {sortCol===col?(sortDir==='asc'?'↑':'↓'):<span style={{opacity:.3}}>⇅</span>}
    </th>
  );

  return(
    <div>
      {/* ── TOP SUMMARY CARDS ── */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:10,marginBottom:16}}>
        {/* Bermasalah */}
        <div style={{background:'#fff',border:'1px solid #e2e4e8',borderRadius:14,padding:'14px 18px',borderLeft:'3px solid #d97706',boxShadow:'0 1px 3px rgba(0,0,0,.06)',cursor:'pointer',outline:txFilter==='issues'?'2px solid #d97706':'none'}} onClick={()=>setTxFilter('issues')}>
          <div style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',color:'#9ca3af',marginBottom:6}}>Perlu Koreksi</div>
          <div style={{fontFamily:"'Bricolage Grotesque',sans-serif",fontSize:28,fontWeight:800,color:'#d97706',lineHeight:1}}>{issues.length}</div>
          <div style={{fontSize:10,color:'#9ca3af',marginTop:4}}>{warnList.length} mirip · {missList.length} tidak ada</div>
        </div>
        {/* Estimasi laba hilang */}
        <div style={{background:'#fff',border:'1px solid #e2e4e8',borderRadius:14,padding:'14px 18px',borderLeft:'3px solid #dc2626',boxShadow:'0 1px 3px rgba(0,0,0,.06)'}}>
          <div style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',color:'#9ca3af',marginBottom:6}}>Laba Hilang (estimasi)</div>
          <div style={{fontFamily:"'Bricolage Grotesque',sans-serif",fontSize:20,fontWeight:800,color:'#dc2626',lineHeight:1}}>{rp(Math.abs(labaHilang))}</div>
          <div style={{fontSize:10,color:'#9ca3af',marginTop:4}}>+{rp(hppTidakDiketahui)} tak diketahui</div>
        </div>
        {/* Jual rugi */}
        <div style={{background:'#fff',border:'1px solid #e2e4e8',borderRadius:14,padding:'14px 18px',borderLeft:'3px solid #7c3aed',boxShadow:'0 1px 3px rgba(0,0,0,.06)',cursor:'pointer',outline:txFilter==='rugi'?'2px solid #7c3aed':'none'}} onClick={()=>setTxFilter('rugi')}>
          <div style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',color:'#9ca3af',marginBottom:6}}>Jual Rugi</div>
          <div style={{fontFamily:"'Bricolage Grotesque',sans-serif",fontSize:28,fontWeight:800,color:'#7c3aed',lineHeight:1}}>{rugiList.length}</div>
          <div style={{fontSize:10,color:'#9ca3af',marginTop:4}}>harga jual &lt; HPP</div>
        </div>
        {/* Bersih */}
        <div style={{background:'#fff',border:'1px solid #e2e4e8',borderRadius:14,padding:'14px 18px',borderLeft:'3px solid #16a34a',boxShadow:'0 1px 3px rgba(0,0,0,.06)',cursor:'pointer',outline:txFilter==='ok'?'2px solid #16a34a':'none'}} onClick={()=>setTxFilter('ok')}>
          <div style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',color:'#9ca3af',marginBottom:6}}>Kode Bersih</div>
          <div style={{fontFamily:"'Bricolage Grotesque',sans-serif",fontSize:28,fontWeight:800,color:'#16a34a',lineHeight:1}}>{TX.length-issues.length}</div>
          <div style={{fontSize:10,color:'#9ca3af',marginTop:4}}>dari {TX.length} total tx</div>
        </div>
      </div>

      {/* ── TOOLBAR ── */}
      <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap',alignItems:'center'}}>
        {/* Search */}
        <input style={{...S.input,minWidth:180,flex:1,maxWidth:260}} placeholder="Cari kode, warna, ket, tgl..." value={search} onChange={e=>setSearch(e.target.value)}/>
        {/* Bulan filter */}
        <select style={{...S.input,cursor:'pointer'}} value={bulanFilter} onChange={e=>setBulanFilter(+e.target.value)}>
          <option value={0}>Semua Bulan</option>
          {allBulans.map(m=><option key={m} value={m}>{MNAME[m]||`Bulan ${m}`}</option>)}
        </select>
        {/* Status filter */}
        <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
          {[['issues','⚠️ Bermasalah'],['warn','Mirip'],['miss','Tidak Ada'],['rugi','🔻 Jual Rugi'],['ok','✅ Bersih'],['all','Semua']].map(([v,l])=>(
            <button key={v} style={{...S.btn(txFilter===v,true),fontSize:10}} onClick={()=>setTxFilter(v)}>{l}</button>
          ))}
        </div>
        {/* View mode toggle */}
        {(txFilter==='issues'||txFilter==='warn'||txFilter==='miss')&&(
          <div style={{display:'flex',border:'1.5px solid #e2e4e8',borderRadius:8,overflow:'hidden',marginLeft:'auto'}}>
            {[['group','📦 Group'],['list','📋 List']].map(([v,l])=>(
              <button key={v} onClick={()=>setViewMode(v)}
                style={{fontSize:10,fontWeight:600,padding:'5px 12px',border:'none',cursor:'pointer',background:viewMode===v?'#111827':'#fff',color:viewMode===v?'#fff':'#6b7280',fontFamily:"'Inter',sans-serif"}}>
                {l}
              </button>
            ))}
          </div>
        )}
      </div>

      {/* ── GROUP VIEW (issues only) ── */}
      {viewMode==='group'&&(txFilter==='issues'||txFilter==='warn'||txFilter==='miss')&&(
        <div style={S.card}>
          <div style={S.cardHdr}>
            <span style={S.cardTitle}>Kode Bermasalah — Group by Kode ({groupList.length} unik)</span>
            <span style={{fontSize:11,color:'#9ca3af'}}>{issues.length} transaksi total</span>
          </div>
          <div style={{maxHeight:560,overflowY:'auto'}}>
            {groupList.filter(g=>!search||g.kode.toLowerCase().includes(search.toLowerCase())).map(g=>{
              const isOpen = !!expandedGroups[g.kode];
              const totRev = g.txs.reduce((s,t)=>s+t.harga*t.qty,0);
              const topSug = g.match?.suggestions?.[0];
              const dbEntry = topSug?.dbEntry;
              const potensiLaba = dbEntry ? g.txs.reduce((s,t)=>(s+(t.harga-dbEntry.hpp)*t.qty),0) : null;
              const stColor = g.st==='warn'?'#d97706':'#dc2626';
              const stBg = g.st==='warn'?'#fffbeb':'#fff5f5';

              return(
                <div key={g.kode} style={{borderBottom:'1px solid #f0f1f3'}}>
                  {/* Group header */}
                  <div style={{display:'flex',alignItems:'center',gap:10,padding:'12px 18px',background:stBg,cursor:'pointer'}}
                    onClick={()=>setExpandedGroups(p=>({...p,[g.kode]:!p[g.kode]}))}>
                    {/* Kode + status */}
                    <div style={{minWidth:120}}>
                      <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,fontSize:13,color:stColor}}>{g.kode}</span>
                      <span style={{marginLeft:8,fontSize:9,fontWeight:700,padding:'2px 7px',borderRadius:20,background:g.st==='warn'?'rgba(217,119,6,.15)':'rgba(220,38,38,.12)',color:stColor}}>
                        {g.st==='warn'?'⚠️ Mirip':'❌ Tidak Ada'}
                      </span>
                    </div>
                    {/* Stats */}
                    <div style={{display:'flex',gap:16,flex:1,alignItems:'center'}}>
                      <div style={{textAlign:'center'}}>
                        <div style={{fontFamily:"'Bricolage Grotesque',sans-serif",fontSize:18,fontWeight:800,color:'#111827',lineHeight:1}}>{g.txs.length}</div>
                        <div style={{fontSize:9,color:'#9ca3af'}}>transaksi</div>
                      </div>
                      <div>
                        <div style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:600,fontSize:11,color:'#374151'}}>{rp(totRev)}</div>
                        <div style={{fontSize:9,color:'#9ca3af'}}>total omzet</div>
                      </div>
                      {potensiLaba!==null&&(
                        <div>
                          <div style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:600,fontSize:11,color:potensiLaba>=0?'#16a34a':'#dc2626'}}>{rp(potensiLaba)}</div>
                          <div style={{fontSize:9,color:'#9ca3af'}}>estimasi laba</div>
                        </div>
                      )}
                    </div>
                    {/* Suggestion + bulk fix */}
                    <div style={{display:'flex',gap:6,alignItems:'center',flexShrink:0}}>
                      {/* Saran koreksi — pilih satu untuk ganti SEMUA */}
                      {g.match?.suggestions?.length>0&&(
                        <div style={{display:'flex',gap:4,alignItems:'center'}}>
                          <span style={{fontSize:9,color:'#9ca3af',marginRight:2}}>Ganti semua →</span>
                          {g.match.suggestions.slice(0,3).map(sg=>(
                            <button key={sg.k}
                              title={`Ganti semua ${g.txs.length} transaksi → ${sg.dbEntry?.kode} (HPP ${rp(sg.dbEntry?.hpp||0)})`}
                              style={{fontSize:10,fontWeight:700,padding:'4px 10px',borderRadius:7,border:'1.5px solid #bfdbfe',background:'#eff6ff',color:'#1d4ed8',cursor:'pointer',fontFamily:"'JetBrains Mono',monospace",transition:'all .12s'}}
                              onMouseEnter={e=>{e.currentTarget.style.background='#dbeafe';e.currentTarget.style.borderColor='#3b82f6';}}
                              onMouseLeave={e=>{e.currentTarget.style.background='#eff6ff';e.currentTarget.style.borderColor='#bfdbfe';}}
                              onClick={e=>{ e.stopPropagation(); g.txs.forEach(t=>applyFix(t.idx,sg.k)); }}>
                              {sg.dbEntry?.kode}
                            </button>
                          ))}
                        </div>
                      )}
                      {g.st==='miss'&&(
                        <span style={{fontSize:10,color:'#9ca3af',fontStyle:'italic'}}>Expand untuk edit ↓</span>
                      )}
                      {/* Expand toggle */}
                      <div style={{width:28,height:28,borderRadius:8,border:'1px solid #e2e4e8',background:'#f8f9fb',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0,marginLeft:4,transition:'all .15s'}}
                        onMouseEnter={e=>{e.currentTarget.style.background='#e2e4e8';}}
                        onMouseLeave={e=>{e.currentTarget.style.background='#f8f9fb';}}>
                        <span style={{fontSize:11,color:'#6b7280',transform:`rotate(${isOpen?0:-90}deg)`,display:'inline-block',transition:'transform .2s'}}>▼</span>
                      </div>
                    </div>
                  </div>

                  {/* Expanded rows */}
                  {isOpen&&(
                    <div style={{overflowX:'auto',background:'#fafafa',borderTop:'1px solid #e2e4e8'}}>
                      <table style={{...S.tbl,fontSize:11}}>
                        <thead>
                          <tr>
                            <th style={S.th}>Bln</th>
                            <th style={{...S.th,textAlign:'center'}}>Tgl</th>
                            <th style={S.th}>Warna</th>
                            <th style={S.th}>Size</th>
                            <th style={{...S.th,textAlign:'center'}}>Qty</th>
                            <th style={S.thr}>Harga</th>
                            <th style={S.th}>Ket</th>
                            <th style={S.th}>Ganti ke</th>
                            <th style={S.th}></th>
                          </tr>
                        </thead>
                        <tbody>
                          {g.txs.map((t,i)=>(
                            <tr key={t.idx} style={{borderBottom:'1px solid #f0f1f3'}}>
                              <td style={S.td}><span style={{...S.badge(t.bulan),fontSize:9}}>{MSHORT[t.bulan]||t.bulan}</span></td>

// Reusable inline edit cell
function EditCell({value, onSave, type='text', width=80, bold=false, color, children, constraints}){
  const [ed, setEd] = useState(false);
  const [val, setVal] = useState(value);
  const inputRef = useRef(null);
  useEffect(()=>{ if(ed && inputRef.current) inputRef.current.select(); },[ed]);
  const commit = () => {
    let parsed = type==='number' ? (parseInt(val)||0) : (val||'').trim();
    // Validasi per field berdasarkan constraints
    if(type==='number' && constraints) {
      if(constraints.min !== undefined && parsed < constraints.min) parsed = constraints.min;
      if(constraints.max !== undefined && parsed > constraints.max) parsed = constraints.max;
    }
    if(type==='text' && !parsed && constraints?.required) { setEd(false); setVal(value); return; }
    setEd(false);
    if(parsed !== value) onSave(parsed);
  };
  const cancel = () => { setEd(false); setVal(value); };
  if(ed) return(
    <input ref={inputRef} autoFocus
      style={{width,border:'1px solid #b01c2e',borderRadius:5,padding:'2px 6px',fontFamily:"'Inter',sans-serif",fontSize:11,fontWeight:600,outline:'none',textAlign:type==='number'?'right':'left',color:'#111827',background:'rgba(176,28,46,.12)',color:'#111827'}}
      type={type==='number'?'number':'text'} value={val}
      onChange={e=>setVal(e.target.value)}
      onBlur={commit}
      onKeyDown={e=>{ if(e.key==='Enter')commit(); if(e.key==='Escape')cancel(); }}
    />
  );
  return(
    <span title="Klik untuk edit"
      style={{cursor:'pointer',fontFamily:"'Inter',sans-serif",fontWeight:bold?700:400,fontSize:11,padding:'2px 4px',borderRadius:4,color:color||'inherit',display:'inline-flex',alignItems:'center',gap:3,minWidth:20}}
      onClick={()=>{ setVal(value); setEd(true); }}>
      {children||value||<span style={{color:'#d1d5db'}}>—</span>}
      <span style={{fontSize:8,opacity:.3}}>✏️</span>
    </span>
  );
}
